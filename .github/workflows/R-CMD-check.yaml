# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'man/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.Rbuildignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'man/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.Rbuildignore'
  schedule:
    # weekly full-matrix run (Sunday 06:00 UTC) to catch platform drift
    - cron: '0 6 * * 0'
  workflow_dispatch:

name: R-CMD-check.yaml

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    # skip draft PRs; everything else runs
    if: ${{ !github.event.pull_request.draft }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        # Push and PR runs are Linux-only to keep them fast. Windows (slower,
        # ~2x cost) is exercised only by the weekly scheduled run, which is
        # enough to catch platform drift without taxing day-to-day pushes.
        config: ${{ fromJSON(github.event_name == 'schedule' && '[{"os":"ubuntu-latest","r":"release"},{"os":"windows-latest","r":"release"}]' || '[{"os":"ubuntu-latest","r":"release"}]') }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # The optional MBG stack (INLA, mbg) lives outside CRAN and cannot be
      # installed in CI, so do not fail the check on those missing Suggests.
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libudunits2-dev
        shell: bash

      # Install hard deps + rcmdcheck + the installable Suggests, but NOT the
      # MBG stack (INLA, mbg) which pak cannot resolve here. `dependencies:
      # '"hard"'` skips Suggests; the installable ones tests need are added
      # back explicitly so the suite still runs.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: >-
            any::rcmdcheck, any::testthat, any::knitr, any::rmarkdown,
            any::arrow, any::sf, any::terra, any::exactextractr,
            any::data.table, any::tibble, any::tidyr, any::stringr,
            any::purrr, any::lubridate, any::zoo, any::scales,
            any::stlplus, any::trend, any::qs2, any::fs, any::glue,
            any::here, any::janitor, any::readr, any::writexl,
            any::countrycode, any::rnaturalearth, any::RColorBrewer,
            any::httr, any::tmap, any::sn

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
