# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Builds the pkgdown site on push to master, on tagged releases, and on
# manual dispatch, then deploys to GitHub Pages. PRs do not build the site
# (no preview deploy, so any PR build is pure waste).
on:
  push:
    branches: [main, master]
    paths:
      - 'R/**'
      - 'vignettes/**'
      - '_pkgdown.yml'
      - '_pkgdown.yaml'
      - 'DESCRIPTION'
      - 'README.md'
      - '.github/workflows/pkgdown.yaml'
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

concurrency:
  group: pkgdown-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libudunits2-dev
        shell: bash

      # Install hard deps (Imports) + the doc toolchain only. The optional
      # MBG stack (INLA, mbg) lives outside CRAN and cannot be resolved by pak
      # here; it is not needed to build the reference or the eval=FALSE
      # vignettes, so we skip Suggests.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: any::pkgdown, any::knitr, any::rmarkdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Drop agent/dev pages pkgdown renders by default
        # pkgdown 2.x renders every root + .github markdown file and offers no
        # config to exclude them. Strip the agent-instruction pages so they
        # never reach the published site.
        run: rm -f docs/CLAUDE.html docs/AGENTS.html
        shell: bash

      - name: Deploy to GitHub pages
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
