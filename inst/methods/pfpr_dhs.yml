title: "PfPR DHS Indicator Methodology"
version: "1.1.0"
description: >
  Methodology for estimating malaria parasite prevalence (PfPR) from DHS data.
  Cluster-level counts are used as input for MBG spatial smoothing.

indicators:
  pfpr_rdt_u5:
    name: "PfPR by RDT (children 6-59 months)"
    numerator: "Number of RDT-positive children"
    denominator: "Number of children tested by RDT"
    age_range_months: [6, 59]
    description: >
      Malaria parasite prevalence measured by rapid diagnostic test among
      children 6-59 months of age.

  pfpr_mic_u5:
    name: "PfPR by microscopy (children 6-59 months)"
    numerator: "Number of microscopy-positive children (Pf only)"
    denominator: "Number of children tested by microscopy"
    age_range_months: [6, 59]
    description: >
      Malaria parasite prevalence measured by microscopy among children
      6-59 months of age. Only P. falciparum infections counted as positive.

  pfpr_rdt_5_10:
    name: "PfPR by RDT (children 5 to under 10 years)"
    numerator: "Number of RDT-positive children"
    denominator: "Number of children tested by RDT"
    age_range_months: [60, 120]

  pfpr_mic_5_10:
    name: "PfPR by microscopy (children 5 to under 10 years)"
    numerator: "Number of microscopy-positive children"
    denominator: "Number of children tested by microscopy"
    age_range_months: [60, 120]

  pfpr_rdt_u10:
    name: "PfPR by RDT (children under 10 years)"
    numerator: "Number of RDT-positive children"
    denominator: "Number of children tested by RDT"
    age_range_months: [6, 119]

  pfpr_mic_u10:
    name: "PfPR by microscopy (children under 10 years)"
    numerator: "Number of microscopy-positive children"
    denominator: "Number of children tested by microscopy"
    age_range_months: [6, 119]

  pfpr_rdt_2_10:
    name: "PfPR by RDT (children 2-10 years)"
    numerator: "Number of RDT-positive children"
    denominator: "Number of children tested by RDT"
    age_range_months: [24, 119]
    description: >
      Standard MAP age group for cross-country comparison. Children must
      be at least 24 months old to be included.

  pfpr_mic_2_10:
    name: "PfPR by microscopy (children 2-10 years)"
    numerator: "Number of microscopy-positive children"
    denominator: "Number of children tested by microscopy"
    age_range_months: [24, 119]
    description: >
      Standard MAP age group for cross-country comparison.

data_sources:
  primary: "PR (Person Recode)"
  gps: "GE (Geographic)"

variables:
  cluster_id:
    dhs_name: "hv001"
    description: "Cluster/enumeration area identifier (geographic cluster number)"
    note: >
      Used as the join key between PR and GE files, and as the grouping unit
      for MBG cluster-level output. For survey design (svydesign), the PSU
      variable hv021 is used instead — see psu below.

  psu:
    dhs_name: "hv021"
    description: "Primary sampling unit for survey design"
    note: >
      Used as the ids argument in svydesign() for survey-weighted estimation
      (calc_pfpr_dhs / calc_pfpr_dhs_core). Distinct from hv001 (geographic
      cluster number). Default in survey_vars$cluster for the weighted
      estimation functions.

  survey_weight:
    dhs_name: "hv005"
    description: "Household sample weight"
    note: >
      Divided by 1,000,000 before use in svydesign() to produce the
      fractional weight. Default in survey_vars$weight.

  stratum:
    dhs_name: "hv022"
    description: "Sample stratum number"
    note: >
      Used as the strata argument in svydesign() when present. If absent,
      stratum is constructed from hv024 (admin1) crossed with hv025
      (urban/rural). Default in survey_vars$stratum.

  adm1:
    dhs_name: "hv024"
    description: "Region / first administrative level"
    note: >
      Used as a grouping variable for admin-level aggregation and as a
      component of the fallback stratum when hv022 is unavailable.
      Default in survey_vars$adm1.

  urban_rural:
    dhs_name: "hv025"
    description: "Type of place of residence (urban/rural)"
    values:
      1: "Urban"
      2: "Rural"
    note: >
      Used as the second component of the fallback stratum construction
      (hv024 x hv025) when hv022 is not present in the data. Not mapped
      via survey_vars; detected automatically by name.

  age_months:
    dhs_name: "hc1"
    description: "Child's age in months (available in PR file via household-child linkage)"

  present:
    dhs_name: "hv103"
    description: "Child slept in household last night"
    values:
      0: "No"
      1: "Yes"

  hh_selected_malaria:
    dhs_name: "hv042"
    description: "Household selected for hemoglobin and malaria testing"
    values:
      0: "No"
      1: "Yes"
    note: >
      Sub-sampling flag used in DHS biomarker modules. Only a subset of
      households are selected for malaria testing. This filter ensures the
      denominator is restricted to children who were eligible to be tested,
      maintaining survey design integrity. Mapped via survey_vars$mother
      in the R functions (a historical naming artefact — the key refers to
      this eligibility flag, not a maternal linkage variable).

  rdt_result:
    dhs_name: "hml35"
    description: "Result of malaria rapid diagnostic test"
    values:
      0: "Negative"
      1: "Positive"

  microscopy_result:
    dhs_name: "hml32"
    description: "Result of malaria blood smear (microscopy)"
    values:
      0: "Negative"
      1: "Positive (P. falciparum)"
      6: "Positive (other species)"
    note: >
      For PfPR, only value 1 (P. falciparum) is counted as positive.
      Value 6 (other species) is included in denominator but not numerator.

  gps_cluster:
    dhs_name: "DHSCLUST"
    description: "Cluster ID in GPS file; used as join key between PR and GE files via hv001"

  gps_lat:
    dhs_name: "LATNUM"
    description: "Latitude coordinate (WGS84)"

  gps_lon:
    dhs_name: "LONGNUM"
    description: "Longitude coordinate (WGS84)"

  malaria_diagnosis:
    dhs_name: "h47"
    description: "Blood taken from child for malaria testing (KR file)"
    note: >
      WMR uses h47 as the MALARIA_DX indicator — whether a diagnostic test
      was performed. This is distinct from hml35/hml32 which measure test
      results. h47 is in KR, hml35/hml32 are in PR.

eligibility:
  - "Child age within specified range (e.g., 6-59 months for u5), applied as age >= min AND age <= max (both bounds inclusive)"
  - "Present in household (hv103 == 1)"
  - "Household selected for malaria testing (hv042 == 1)"
  - "Valid test result (not missing/refused/not tested): hml35 in {0,1} for RDT; hml32 in {0,1,6} for microscopy"

output_format:
  dhs_survey_output:
    description: >
      Returns a named list with one element per admin level: list(adm0, adm1, adm2, ...).
      Each element is a long-format tibble with one row per indicator per geographic unit.
      Values are proportions on the 0-1 scale rounded to 3 decimal places.
    columns:
      survey_id: "DHS survey identifier"
      iso3: "ISO3 country code"
      iso2: "ISO2 country code"
      survey_type: "Survey type (DHS, MIS, etc.)"
      survey_year: "Survey year"
      adm0: "Country name"
      adm1: "First admin level (adm1 table and below)"
      adm2: "Second admin level (adm2 table and below)"
      type: "Estimate type: 'survey_weighted'"
      geo_source: "Geographic data source (e.g., 'ge' for GPS/shapefile)"
      point: "Survey-weighted PfPR proportion (0-1 scale, rounded to 3 dp)"
      ci_l: "Lower 95% CI (clamped to [0,1])"
      ci_u: "Upper 95% CI (clamped to [0,1])"
      numerator: "Unweighted count of positive children (integer)"
      denominator: "Unweighted count of tested children (integer)"
      indicator: "Human-readable indicator name"
      indicator_code: "Machine-readable indicator code"
      numerator_description: "Description of what the numerator counts"
      denominator_description: "Description of what the denominator counts"
      denominator_code: "Short code for the denominator"
    indicator_codes:
      - "pfpr_rdt: PfPR by RDT"
      - "pfpr_mic: PfPR by microscopy"

  mbg_cluster:
    description: >
      Output of calc_pfpr_mbg() and prep_pfpr_mbg(). One row per cluster with
      valid GPS coordinates. Unweighted cluster counts used as input for MBG
      spatial modeling. Clusters with zero samplesize are excluded. This format
      matches the expected input for mbg::MbgModelRunner.
    columns:
      cluster_id: "Cluster identifier"
      indicator: "Numerator count (number positive)"
      samplesize: "Denominator count (number tested with valid result)"
      x: "Longitude (WGS84)"
      y: "Latitude (WGS84)"

methodology:
  survey_weights: >
    For DHS direct estimates (calc_pfpr_dhs / calc_pfpr_dhs_core), survey
    weights are applied via svydesign(). The PSU variable hv021 is used as
    the clustering unit (ids), hv022 as the stratum (or a derived stratum
    from hv024 x hv025 when hv022 is absent), and hv005 / 1,000,000 as the
    weight. For MBG spatial modeling inputs (calc_pfpr_mbg / prep_pfpr_mbg),
    unweighted cluster counts are used as MBG handles spatial smoothing and
    uncertainty internally.

  aggregation: >
    Survey-weighted: svyby() + svymean() per grouping variable. Counts via
    svytotal(). For admin-level aggregation from cluster results, a
    sample-size weighted mean (weighted.mean with w = n_tested) is used.
    MBG: simple unweighted counts aggregated at cluster level.
    Numerator = sum of positive tests. Denominator = total with valid results.

  age_groups: >
    Multiple age groups supported to enable analysis of different populations.
    All age bounds are inclusive (age >= min AND age <= max). Standard groups
    include: u5 (6-59 months), 5_10 (60-120 months), u10 (6-119 months), and
    2_10 (24-119 months). The 2_10 age group aligns with MAP standard for
    cross-country comparison. Age filtering in MBG functions occurs per-group
    after a broad initial filter; in survey-weighted functions the default
    filter is applied in .prepare_pfpr_data() with age_min=6, age_max=59.

  wmr_comparison: >
    WMR uses hml35 (RDT) as primary and refers to the indicator as
    MALARIA_PARASITES. The variable malaria_parasite in WMR derives from
    hml35. WMR denominates on children 6-59 months selected for parasite
    screening with non-missing results. WMR also stratifies by age group,
    wealth, sex, residence, and education using svyciprop. The sntmethods
    MBG approach uses unweighted cluster counts for spatial modeling input.

validation:
  - "Age range must be valid (min < max, both non-negative)"
  - "Test results must be 0 or 1 for RDT, 0/1/6 for microscopy"
  - "Clusters with missing GPS coordinates are excluded (filtered in .prepare_gps_data via x != 0 AND y != 0 AND not NA)"
  - "Clusters with zero samplesize are excluded from MBG output"

references:
  - "DHS Malaria Indicator Survey Guide"
  - "Malaria Atlas Project (MAP) methodology"
  - "WHO World Malaria Report guidance on PfPR estimation"
