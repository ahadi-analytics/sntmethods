title: "Care-Seeking Behavior DHS Indicator Methodology"
version: "1.1.0"
description: >
  Methodology for estimating care-seeking behavior indicators from DHS data.
  Measures where/whether care was sought for febrile children under 5.
  Aligned with WHO World Malaria Report care-seeking cascade methodology.

indicators:
  csb_any:
    name: "Sought any care"
    numerator: "Febrile children who sought care anywhere"
    denominator: "Children under 5 with fever in last 2 weeks"
    description: >
      Proportion of U5 children with fever who sought care from any source.
      Equivalent to WMR CSB_ANY_TREATMENT.

  csb_public:
    name: "Sought public sector care"
    numerator: "Febrile children who sought care at public facility or CHW"
    denominator: "Children under 5 with fever in last 2 weeks"
    description: >
      Proportion who sought care at public health facilities or from
      community health workers. WMR also computes csb_public_nochw
      (public excluding CHW) as a separate subcategory.

  csb_private:
    name: "Sought private sector care"
    numerator: "Febrile children who sought care at private facility"
    denominator: "Children under 5 with fever in last 2 weeks"
    description: >
      Proportion who sought care from private sector (formal, informal,
      or pharmacy).

  csb_private_formal:
    name: "Sought care at private formal facility"
    numerator: "Febrile children who sought care at private hospital/clinic"
    denominator: "Children under 5 with fever in last 2 weeks"
    description: >
      Proportion who sought care from private hospitals, clinics, or doctors.
      Excludes pharmacies and informal providers.
    note: "Available in DHS survey-weighted output. For MBG, aggregated into csb_private."

  csb_pharmacy:
    name: "Sought care at pharmacy"
    numerator: "Febrile children who sought care at pharmacy/drug shop"
    denominator: "Children under 5 with fever in last 2 weeks"
    description: >
      Proportion who sought care from pharmacies or drug shops.
    note: "Available in DHS survey-weighted output. For MBG, aggregated into csb_private."

  csb_private_formal_pha:
    name: "Sought care at private formal or pharmacy"
    numerator: "Febrile children who sought care at private formal facility or pharmacy"
    denominator: "Children under 5 with fever in last 2 weeks"
    description: >
      Union of private formal and pharmacy. Used by WMR as a combined category.
    note: "Available in DHS survey-weighted output. For MBG, aggregated into csb_private."

  csb_private_informal:
    name: "Sought care from informal private source"
    numerator: "Febrile children who sought care from traditional/informal provider"
    denominator: "Children under 5 with fever in last 2 weeks"
    description: >
      Proportion who sought care from traditional practitioners, shops,
      markets, or other informal sources.
    note: "Available in DHS survey-weighted output. For MBG, aggregated into csb_private."

  csb_chw:
    name: "Sought care from community health worker"
    numerator: "Febrile children who sought care from CHW/NGO"
    denominator: "Children under 5 with fever in last 2 weeks"
    description: >
      Proportion who sought care from community health workers or NGO
      sector providers.
    note: "Available in DHS survey-weighted output. For MBG, aggregated into csb_public."

  csb_trained:
    name: "Sought care from trained provider"
    numerator: "Febrile children who sought care from trained provider"
    denominator: "Children under 5 with fever in last 2 weeks"
    description: >
      Proportion who sought care from public, CHW, private formal, or pharmacy
      (excludes informal providers). Equivalent to WMR CSB_TRAINED_PROVIDER.

  csb_none:
    name: "No care sought"
    numerator: "Febrile children who did not seek care"
    denominator: "Children under 5 with fever in last 2 weeks"
    description: >
      Proportion who did not seek any care for fever. This is the complement
      of csb_any (csb_any + csb_none = 1). Equivalent to WMR CSB_NOTREATMENT.

data_sources:
  primary: "KR (Children's Recode)"
  gps: "GE (Geographic)"

variables:
  cluster_id:
    dhs_name: "v021"
    description: "Cluster/PSU identifier (primary sampling unit)"

  age:
    dhs_name: "hw1"
    description: "Child's age in months"

  fever:
    dhs_name: "h22"
    description: "Child had fever in last 2 weeks"
    values:
      0: "No"
      1: "Yes"

  weight:
    dhs_name: "v005"
    description: "Sample weight (divided by 1,000,000 before use)"

  stratum:
    dhs_name: "v022"
    description: "Survey stratum identifier"

  treatment_sources:
    prefix: "h32"
    description: >
      Series of variables (h32a through h32u, and h32na through h32ne for
      DHS-8 CHW variables) indicating where treatment was sought.
      Value of 1 means source was visited.

csb_classification:
  public:
    description: "Government health facilities"
    variables: ["h32a", "h32b", "h32c", "h32d", "h32e", "h32f", "h32g", "h32h", "h32i"]

  chw:
    description: "Community health workers / NGO sector"
    variables: ["h32na", "h32nb", "h32nc", "h32nd", "h32ne"]

  private_formal:
    description: "Private hospitals, clinics, doctors"
    variables: ["h32j", "h32k", "h32l", "h32m"]

  private_informal:
    description: "Traditional practitioners, other informal"
    variables: ["h32s", "h32t", "h32u"]

  pharmacy:
    description: "Pharmacies and drug shops"
    variables: ["h32n", "h32o", "h32p", "h32q", "h32r"]

eligibility:
  - "Child age 0-59 months"
  - "Child had fever in last 2 weeks (h22 == 1)"
  note: >
    All febrile U5 children are eligible regardless of GPS availability.
    GPS coordinates are used only for spatial aggregation to administrative
    units; clusters without valid coordinates are assigned to the nearest
    admin unit when join_nearest = TRUE.

methodology:
  overlapping_indicators: >
    IMPORTANT: Care-seeking indicators (except none) are NOT mutually exclusive.
    A child can be counted in both public AND private if they visited both
    sectors. Only csb_any and csb_none are mutually exclusive.

  derived_indicators:
    csb_public: "has_public OR has_chw (any public sector or CHW visit)"
    csb_private: "has_private_formal OR has_private_informal OR has_pharmacy"
    csb_private_formal_pha: "has_private_formal OR has_pharmacy (intermediate)"
    csb_trained: "csb_public OR csb_private_formal_pha (public OR chw OR private_formal OR pharmacy)"
    csb_any: "csb_public OR csb_private (equivalent to any h32 variable == 1)"
    csb_none: "NOT(csb_any) — i.e., csb_public == 0 AND csb_private == 0"
    note: >
      csb_public_nochw (public excluding CHW) and csb_chw, csb_private_formal,
      csb_pharmacy, and csb_private_informal are intermediate base categories
      (has_* columns) computed internally but not directly output by
      calc_csb_dhs_core(). They are used by the MBG pipeline and are available
      in the internal kr_fever data frame via .prepare_csb_data().

  wmr_cascade_context: >
    Care-seeking is step 1 of the WMR care-seeking cascade:
    Step 0 Fever (h22) -> Step 1 Sought care (CSB, h32 series) ->
    Step 2 Diagnosed (MALARIA_DX, h47/ml1) ->
    Step 3 Any antimalarial (ml13 series) -> Step 4 Received ACT (ml13e).
    ACT indicators are in a separate file (act_dhs.yml).

  wmr_stratification: >
    WMR computes CSB at multiple levels: (1) overall among febrile children,
    (2) by residence (urban/rural), (3) csb_any by sociodemographic factors
    (wealth, sex, education), (4) subcategories among those who sought ANY
    treatment (conditional on csb_any == 1).

  survey_design: >
    WMR uses svydesign(id=~cluster, weights=~weight, strata=~strata, nest=TRUE)
    with svymean for proportions. options(survey.lonely.psu = "certainty").
    Note: WMR reference code uses survey::svyciprop() for binary indicators;
    this implementation uses survey::svymean(), which produces identical point
    estimates with slightly different CI computation. When only one stratum is
    present the design is constructed without strata.

output_format:
  dhs_survey_output:
    description: >
      Returns a named list with one element per admin level: list(adm0, adm1, ...).
      Each element is a long-format tibble with one row per indicator per geographic unit.
      All proportion values are on the 0-1 scale (not percentages).
    columns:
      survey_id: "DHS survey identifier"
      iso3: "ISO3 country code"
      iso2: "ISO2 country code"
      survey_type: "Survey type (DHS, MIS, etc.)"
      survey_year: "Survey year"
      adm0: "Country name"
      adm1: "First admin level (adm1 table and below)"
      type: "Estimate type: 'survey_weighted'"
      geo_source: "Geographic data source (e.g., 'ge' for GPS/shapefile)"
      point: "Survey-weighted proportion (0-1 scale, rounded to 3 dp)"
      ci_l: "Lower 95% CI (clamped to [0,1])"
      ci_u: "Upper 95% CI (clamped to [0,1])"
      numerator: "Unweighted count (integer)"
      denominator: "Unweighted count (integer)"
      indicator: "Human-readable indicator name"
      indicator_code: "Machine-readable indicator code"
      numerator_description: "Description of what the numerator counts"
      denominator_description: "Description of what the denominator counts"
      denominator_code: "Short code for the denominator"
    indicator_codes:
      - "csb_any: Sought care from any source"
      - "csb_none: No care sought"
      - "csb_public: Sought public sector care (incl. CHW)"
      - "csb_pub_nochw: Sought public sector care (excl. CHW)"
      - "csb_chw: Sought care from CHW"
      - "csb_private: Sought private sector care (formal + informal + pharmacy)"
      - "csb_priv_formal: Sought care at private formal facility"
      - "csb_pharmacy: Sought care at pharmacy/drug shop"
      - "csb_priv_informal: Sought care from informal provider"
      - "csb_priv_form_pha: Sought care at private formal or pharmacy"
      - "csb_trained: Sought care from trained provider"

status: "implemented"
note: >
  Implemented as calc_csb_dhs_core() and calc_csb_dhs(). Also available as
  step 1 of calc_case_management_dhs(). The alive (b5) variable is accepted
  in survey_vars but NOT used to filter the CSB denominator — the function
  assumes the KR dataset has already been restricted to living children, or
  that the WMR convention of not explicitly filtering by alive status for the
  care-seeking denominator is followed. The fever prevalence function
  (calc_fever_dhs_core) DOES apply the b5 == 1 filter.

references:
  - "WHO World Malaria Report - Care seeking methodology"
  - "DHS Guide to Statistics - Treatment seeking"
