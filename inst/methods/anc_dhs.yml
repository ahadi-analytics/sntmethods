title: "ANC DHS Indicator Methodology"
version: "1.2.0"
description: >
  Methodology for estimating Antenatal Care (ANC) attendance from DHS data.
  Calculates proportion of women with recent births who received specified
  number of ANC visits.

indicators:
  anc_1plus:
    name: "ANC 1+ visits"
    numerator: "Women with at least 1 ANC visit"
    denominator: "Women with births in analysis window"
    description: >
      Proportion of women who received at least one antenatal care visit
      during their most recent pregnancy.

  anc_3plus:
    name: "ANC 3+ visits"
    numerator: "Women with at least 3 ANC visits"
    denominator: "Women with births in analysis window"
    description: >
      Proportion of women who received at least three antenatal care visits.
      Note: anc_3plus >= anc_4plus for all groups (cumulative indicator).

  anc_4plus:
    name: "ANC 4+ visits"
    numerator: "Women with at least 4 ANC visits"
    denominator: "Women with births in analysis window"
    description: >
      Proportion of women who received at least four antenatal care visits.
      This was the WHO-recommended minimum until 2016.

  anc_8plus:
    name: "ANC 8+ visits"
    numerator: "Women with at least 8 ANC visits"
    denominator: "Women with births in analysis window"
    description: >
      Proportion of women who received at least eight antenatal care visits.
      This is the current WHO recommendation (2016 guidelines).

data_sources:
  primary: "IR (Individual Recode)"
  gps: "GE (Geographic)"

variables:
  cluster_id:
    dhs_name: "v021"
    description: "PSU/cluster identifier used for survey design (v021)"
    note: >
      The DHS survey-weighted function (calc_anc_dhs_core) uses v021 (PSU)
      as the cluster variable for the survey design ids argument. The MBG
      function (calc_anc_mbg) defaults to v001 (community cluster number).
      v021 and v001 often coincide but v021 is the recommended PSU identifier
      for complex survey variance estimation.

  survey_weight:
    dhs_name: "v005"
    description: "Sample weight (divide by 1,000,000 for proportions)"

  stratum:
    dhs_name: "v022"
    description: "Sample stratum (used for stratified survey design)"

  interview_date:
    dhs_name: "v008"
    description: "Date of interview (CMC format)"

  birth_date:
    dhs_name: "b3_01"
    description: "Date of most recent birth (CMC format)"
    note: >
      _1 (or _01 in zero-padded wide format) suffix indicates the most
      recent birth from the birth history. Birth window is computed as
      interview_cmc - b3_01 (months elapsed).

  anc_visits:
    dhs_name: "m14_1"
    description: "Number of antenatal visits during last pregnancy"
    note: >
      Value 98 = 'don't know' and is excluded (filter: anc_visits < 98).
      _1 (or _01) suffix indicates most recent birth. Values are integers
      representing visit counts.

  gps_cluster:
    dhs_name: "DHSCLUST"
    description: "Cluster ID in GPS file (GE recode)"

  gps_lat:
    dhs_name: "LATNUM"
    description: "Latitude coordinate"

  gps_lon:
    dhs_name: "LONGNUM"
    description: "Longitude coordinate"

eligibility:
  - "Woman had a birth within analysis window (CMC filter: interview_cmc - b3_01 <= birth_window_months)"
  - "Birth is not in the future (months_since_birth >= 0)"
  - "Valid ANC response: anc_visits not NA and anc_visits < 98 (98 = 'don't know')"
  - "Cluster has valid GPS coordinates (MBG path only)"

methodology:
  birth_window: >
    Default analysis window differs by function: calc_anc_dhs_core and
    calc_anc_dhs use 24 months (2 years) as the default to match standard
    DHS reporting conventions. calc_anc_mbg and prep_anc_mbg use 36 months
    (3 years) to maximise spatial data density for geostatistical modelling.
    Maximum is 60 months (5 years). Shorter windows reflect more recent
    births but reduce sample sizes.

  cmc_format: >
    Century Month Code (CMC) is used for dates. CMC = (year - 1900) * 12 + month.
    Example: January 2020 = (2020 - 1900) * 12 + 1 = 1441.

  most_recent_birth: >
    Only the most recent birth is included to avoid double-counting women
    with multiple births in the analysis window. In DHS wide-format IR files
    the birth history index uses _1 or _01 (zero-padded) for the most recent
    birth (index 1 = chronologically last). The implementation uses b3_01 and
    m14_1 which both refer to the most recent birth.

output_format:
  dhs_survey_output:
    description: >
      Returns a named list with one element per admin level: list(adm0, adm1, ...).
      Each element is a long-format tibble with one row per indicator per geographic unit.
    columns:
      survey_id: "DHS survey identifier"
      iso3: "ISO3 country code"
      iso2: "ISO2 country code"
      survey_type: "Survey type (DHS, MIS, etc.)"
      survey_year: "Survey year"
      adm0: "Country name"
      adm1: "First admin level (adm1 table and below)"
      type: "Estimate type: 'survey_weighted'"
      geo_source: "Geographic data source (e.g., 'ge' for GPS/shapefile)"
      point: "Survey-weighted proportion (0-1 scale, rounded to 3 dp)"
      ci_l: "Lower 95% CI (clamped to [0,1])"
      ci_u: "Upper 95% CI (clamped to [0,1])"
      numerator: "Unweighted count (integer)"
      denominator: "Unweighted count (integer)"
      indicator: "Human-readable indicator name"
      indicator_code: "Machine-readable indicator code"
      numerator_description: "Description of what the numerator counts"
      denominator_description: "Description of what the denominator counts"
      denominator_code: "Short code for the denominator"
    indicator_codes:
      - "anc_1plus: ANC 1+ visits"
      - "anc_2plus: ANC 2+ visits"
      - "anc_3plus: ANC 3+ visits"
      - "anc_4plus: ANC 4+ visits"
      - "anc_8plus: ANC 8+ visits"
    monotonicity: "anc_1plus >= anc_2plus >= anc_3plus >= anc_4plus >= anc_8plus"

  mbg_cluster_output:
    description: "Output of calc_anc_mbg() — unweighted cluster-level counts"
    columns:
      cluster_id: "Cluster identifier"
      indicator: "Number of women meeting threshold"
      samplesize: "Total women with recent births"
      x: "Longitude"
      y: "Latitude"

validation:
  - "Birth must be within analysis window"
  - "ANC visits must be valid number (< 98)"
  - "Interview date must be after birth date"
  - "Clusters with zero eligible women excluded"

references:
  - "WHO. WHO recommendations on antenatal care. 2016."
  - "DHS Guide to Statistics - ANC Coverage"
  - "Countdown to 2030 - ANC indicators"
