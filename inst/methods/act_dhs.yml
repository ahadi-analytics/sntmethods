title: "ACT Treatment DHS Indicator Methodology"
version: "1.0.0"
description: >
  Methodology for estimating ACT (artemisinin-based combination therapy)
  treatment indicators from DHS data. Extracted from care-seeking behavior
  as a separate indicator category aligned with the WMR care-seeking cascade.

indicators:
  act:
    name: "Received ACT among febrile children"
    numerator: "Febrile children who received ACT"
    denominator: "Children under 5 with fever and non-missing ACT response"
    description: >
      Proportion of U5 children with fever in last 2 weeks who received ACT.
      WMR also computes this stratified by CSB category (e.g., ACT among
      those who sought public care) and by sociodemographic factors.

  act_tested:
    name: "Received ACT among test-filtered children"
    numerator: "Children who received ACT within the test-filtered subset"
    denominator: >
      Children under 5 with fever where the survey_vars$test variable equals 1.
      The default test variable is ml13a (chloroquine in standard DHS recode).
      This is a sntmethods-specific proxy and does NOT replicate the WMR
      act_tested indicator. WMR uses h47 (malaria_dx, blood taken for testing)
      as the diagnosed denominator. This indicator should be interpreted with
      caution and the test variable verified against the survey-specific recode
      manual before use.
    description: >
      Proportion receiving ACT among children where survey_vars$test == 1.
      More restrictive denominator than act. This is a secondary/exploratory
      indicator; the primary act indicator uses all febrile children as denominator.

  act_public:
    name: "Received ACT among febrile children who sought public care"
    numerator: "Febrile children who sought public care and received ACT"
    denominator: "Children under 5 with fever who sought public care (csb_public == 1)"
    description: >
      Proportion of U5 children with fever in last 2 weeks who sought care
      from a public health facility or CHW and received ACT. Denominator is
      restricted to public care seekers.

  act_among_am:
    name: "Received ACT among antimalarial recipients who sought care"
    numerator: "Febrile children who sought care, received an antimalarial, and received ACT"
    denominator: "Children under 5 with fever who sought any care (csb_any == 1) AND received any antimalarial"
    description: >
      Proportion receiving ACT among febrile U5 children
      who sought care and received any antimalarial treatment. This is the
      standard WMR headline indicator "Use of ACTs among those for whom care
      was sought and who were treated with an antimalarial". This indicator
      is also used as the ACT component in the effective case management
      (eff_cm) composite calculation.

  febrile_rdt_pos:
    name: "RDT positivity rate among febrile children under 5"
    numerator: "Febrile U5 children with positive RDT (hml35 == 1)"
    denominator: "Febrile U5 children with valid RDT result (hml35 == 0 or 1)"
    data_sources: "KR (h22 fever) linked to PR (hml35 RDT result)"
    description: >
      Proportion of febrile children under 5 with a valid RDT test result who
      tested positive for malaria. Requires linking the KR file (fever status
      h22) with the PR file (RDT result hml35) via household and child line
      numbers. Children without a valid RDT result (hml35 not in 0:1) are
      excluded from the denominator. Requires dhs_pr argument.
    note: >
      This is the test positivity rate among febrile children — not the same
      as population PfPR (which uses all children tested, not just febrile
      ones). The linkage key is: KR.v001 + KR.v002 + KR.b16_01 = PR.hv001 +
      PR.hv002 + PR.hvidx.

  febrile_rdt_pos_act:
    name: "ACT coverage among febrile RDT-positive children under 5"
    numerator: "Febrile RDT-positive U5 children who received ACT (ml13e == 1)"
    denominator: "Febrile U5 children who are RDT-positive (hml35 == 1)"
    data_sources: "KR (h22 fever, ml13e ACT) linked to PR (hml35 RDT result)"
    description: >
      Proportion of febrile RDT-positive children under 5 who received ACT
      treatment. Denominator is febrile children who tested positive by RDT.
      ACT receipt implies care-seeking occurred; the indicator directly captures
      the treatment gap among confirmed malaria cases in U5 children.
      Requires dhs_pr argument.
    note: >
      This is the most policy-relevant ACT metric for confirmed malaria cases.
      Compare with act (denominator = all febrile children) and act_tested
      (denominator = survey_vars$test == 1, typically a proxy variable).

data_sources:
  primary: "KR (Children's Recode)"
  gps: "GE (Geographic)"

variables:
  # --- Variables used by calc_act_dhs() (survey-weighted estimates) ---
  cluster_dhs:
    dhs_name: "v021"
    description: "Sample cluster/PSU identifier for survey design (used in calc_act_dhs)"
    note: "Default survey_vars$cluster. Not the same as v001 used by calc_act_mbg."

  weight:
    dhs_name: "v005"
    description: "Survey sample weight (divided by 1e6 in R to obtain fractional weight)"

  stratum:
    dhs_name: "v022"
    description: "Survey stratum identifier for stratified design"

  # --- Variables used by calc_act_mbg() (cluster-level MBG counts) ---
  cluster_mbg:
    dhs_name: "v001"
    description: "Cluster/enumeration area identifier for MBG spatial aggregation"
    note: "Default survey_vars$cluster in calc_act_mbg. Not the same as v021 used by calc_act_dhs."

  age:
    dhs_name: "hw1"
    description: "Child's age in months"

  fever:
    dhs_name: "h22"
    description: "Child had fever in last 2 weeks"
    values:
      0: "No"
      1: "Yes"

  act_treatment:
    dhs_name: "ml13e (or h37e in older surveys)"
    description: "Child received ACT (artemisinin-based combination therapy)"
    values:
      0: "No"
      1: "Yes"
    fallback: >
      When ml13e is absent, sntmethods uses h37e ("Combination with artemisinin
      taken for fever/cough") as the ACT variable. This occurs in older DHS
      surveys such as BFA 2021 which use the h37* drug series instead of ml13*.
      Detection is automatic at runtime in .prepare_act_data().

  rdt_result:
    dhs_name: "hml35"
    description: >
      RDT test result from the Person Recode (PR) file. Used for febrile_rdt_pos
      and febrile_rdt_pos_act indicators. Linked to KR via hv001 + hv002 + hvidx.
    values:
      0: "Negative"
      1: "Positive"
    note: >
      Only values 0 and 1 are treated as valid test results. Other codes
      (e.g., 6 = no result / not done) are excluded from the denominator.
      This variable is from the PR file, not the KR file.

  test_filter:
    dhs_name: "ml13a (default; configurable via survey_vars$test)"
    description: >
      Variable used as denominator filter for the act_tested indicator.
      Default is ml13a (chloroquine in standard DHS recode). This is a
      sntmethods-specific proxy — not equivalent to WMR's diagnosed denominator.
      WMR uses h47 (blood taken for malaria testing) for the diagnosed subset.
      Verify the intended meaning of this variable per survey recode manual
      before interpreting act_tested results.
    values:
      0: "No / not applicable"
      1: "Yes / filter included"
    note: >
      Set survey_vars$test to a different column (e.g., "h47") to use a
      more appropriate test-positive denominator aligned with WMR methodology.

eligibility:
  - "Child is alive (b5 == 1)"
  - "Child age 0-59 months (hw1 >= 0 and hw1 <= 59)"
  - "Child had fever in last 2 weeks (h22 == 1)"
  - "Non-missing ACT response (received_act not NA) for act indicator"
  - "'Don't know' responses (value 8) and coded-missing (value 9) are recoded to NA and excluded from both numerator and denominator"
  - "survey_vars$test == 1 for act_tested indicator (default: ml13a == 1; see test_filter variable note)"
  - "act_among_am: csb_any == 1 AND received_antimalarial == 1 AND non-missing ACT"
  - "Valid GPS coordinates required only for calc_act_mbg() output"
  - "febrile_rdt_pos: febrile child matched to PR via v001+v002+b16_01 with hml35 in {0, 1}"
  - "febrile_rdt_pos_act: same as above, restricted to hml35 == 1 (RDT-positive)"

methodology:
  wmr_cascade_context: >
    ACT is step 4 (final step) of the WMR care-seeking cascade (0-indexed):
    Step 0: Fever (h22) -> Step 1: Sought care (CSB, h32 series) ->
    Step 2: Diagnosed (MALARIA_DX, h47) ->
    Step 3: Treated (ANTIMALARIAL, ml13 series or h37 series) ->
    Step 4: Received ACT (ml13e or h37e).
    This numbering is consistent with calc_case_management_dhs() which assigns
    step = 4L to the received_act cascade row.

  variable_detection: >
    sntmethods auto-detects the ACT variable at runtime:
    (1) ml13e preferred — used when present (DHS Phase 7+, most surveys ~2015+).
    (2) h37e fallback — used when ml13e absent (older surveys, e.g. BFA 2021).
        h37e = "Combination with artemisinin taken for fever/cough".
    For the full antimalarial series (used in antimalarial_dhs.yml), the primary
    series is all columns matching ^ml13[a-z]*$, and the fallback series is all
    columns matching ^h37[a-h]$ (h37a through h37h — eight variables covering SP,
    chloroquine, amodiaquine, quinine, ACT, primaquine, mefloquine, and other).
    See antimalarial_dhs.yml for the complete variable mapping.

  wmr_act_levels: >
    WMR computes ACT receipt at multiple levels:
    (1) among all febrile children (denominator: fever==yes),
    (2) among those who sought any treatment (denominator: csb_any==1),
    (3) among those who received any antimalarial and sought care
        (denominator: csb_any==1 & received_antimalarial==1),
    (4) among those diagnosed with malaria (denominator: csb_any==1 & malaria_dx==yes).
    sntmethods implements level (1) as the act indicator and level (3) as
    act_among_am. The act_among_am indicator matches the WMR headline
    "Use of ACTs among those for whom care was sought and who were treated
    with an antimalarial".
    The act_tested indicator uses a configurable proxy variable (default: ml13a)
    as a denominator filter — this does NOT replicate WMR level (4). To align
    with WMR level (4), set survey_vars$test = "h47" (blood taken for testing).

  antimalarial_variables: >
    WMR defines "received any antimalarial" as ANY of: ml13e (ACT), ml13a
    (chloroquine), ml13b (quinine), ml13c (amodiaquine), ml13d (artesunate),
    ml13aa (SP/Fansidar), primaquine, mefloquine, and drugs_antimalarial
    (a catch-all "other antimalarial" variable whose DHS name varies by survey).
    The act indicator uses only ml13e.

  survey_design: >
    svydesign(id=~cluster, weights=~weight, strata=~strata, nest=TRUE).
    options(survey.lonely.psu = "certainty") applied when strata are present.
    sntmethods uses survey::svymean() for point estimates and CIs (not svyciprop).
    Both produce equivalent point estimates; CI widths differ slightly.
    When only one stratum is detected, the stratified design is dropped and
    a cluster-only design is used to avoid singleton-PSU errors.
    Survey weights (v005) are divided by 1e6 to obtain fractional weights.
    For MBG spatial modeling (calc_act_mbg), unweighted cluster counts are
    used instead — no survey design object is constructed.

output_format:
  dhs_survey_output:
    description: >
      Returns a named list with one element per admin level: list(adm0, adm1, adm2, ...).
      Each element is a long-format tibble with one row per indicator per geographic unit.
    columns:
      survey_id: "DHS survey identifier"
      iso3: "ISO3 country code"
      iso2: "ISO2 country code"
      survey_type: "Survey type (DHS, MIS, etc.)"
      survey_year: "Survey year"
      adm0: "Country name"
      adm1: "First admin level (adm1 table and below)"
      adm2: "Second admin level (adm2 table and below)"
      type: "Estimate type: 'survey_weighted'"
      geo_source: "Geographic data source (e.g., 'ge' for GPS/shapefile)"
      point: "Survey-weighted proportion (0-1 scale, rounded to 3 dp)"
      ci_l: "Lower 95% CI (clamped to [0,1])"
      ci_u: "Upper 95% CI (clamped to [0,1])"
      numerator: "Unweighted count (integer)"
      denominator: "Unweighted count (integer)"
      indicator: "Human-readable indicator name"
      indicator_code: "Machine-readable indicator code"
      numerator_description: "Description of what the numerator counts"
      denominator_description: "Description of what the denominator counts"
      denominator_code: "Short code for the denominator"
    indicator_codes:
      - "act: ACT receipt among all febrile children"
      - "act_public: ACT among public sector care seekers (no AM filter)"
      - "act_pub_am: ACT among public sector + antimalarial"
      - "act_chw_am: ACT among CHW care seekers"
      - "act_am: ACT among antimalarial recipients who sought any care"
      - "act_am_public: ACT among antimalarial recipients from public sector"
      - "febrile_rdt_pos: RDT positivity among febrile children (requires dhs_pr)"
      - "febrile_rdt_pos_act: ACT coverage among febrile RDT+ children (requires dhs_pr)"

  mbg_cluster_output:
    description: "Output of calc_act_mbg() — unweighted cluster-level counts for MBG"
    columns:
      cluster_id: "Cluster identifier (v001)"
      indicator: "Numerator count (children receiving ACT in cluster)"
      samplesize: "Denominator count (eligible febrile children in cluster)"
      x: "Longitude"
      y: "Latitude"

status: "implemented"
note: >
  Survey-weighted estimates implemented as calc_act_dhs().
  Cluster-level MBG inputs implemented as calc_act_mbg() and prep_act_mbg().
  Also available as step 4 of calc_case_management_dhs().
  The ACT indicator is a subset of the antimalarial indicator (antimalarial_dhs.yml).

references:
  - "WHO World Malaria Report - ACT treatment indicators"
  - "DHS Guide to Statistics - Antimalarial treatment"
