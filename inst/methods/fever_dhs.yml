title: "Fever Prevalence — WMR Methodology Reference"
version: "1.0.0"
description: >
  Documents the WMR approach to fever prevalence estimation among
  children under 5. Fever prevalence is the entry point for the
  care-seeking cascade (fever -> CSB -> diagnosis -> treatment -> ACT).

indicators:
  fever:
    name: "Fever prevalence in children under 5"
    numerator: "Children with fever in last 2 weeks"
    denominator: "All children under 5 (alive)"
    description: >
      Proportion of living children under 5 who had fever in the 2 weeks
      preceding the survey. This is the base denominator for the entire
      care-seeking cascade.

data_sources:
  primary: "KR (Children's Recode)"

variables:
  fever:
    dhs_name: "h22"
    description: "Child had fever in last 2 weeks"
    values:
      0: "No"
      1: "Yes"

  age:
    dhs_name: "hw1"
    description: "Child age in months"

  alive:
    dhs_name: "b5"
    description: "Child is alive"
    values:
      0: "No"
      1: "Yes"

  cluster:
    dhs_name: "v021"
    description: "Cluster/PSU identifier (primary sampling unit)"

  weight:
    dhs_name: "v005"
    description: "Sample weight (divided by 1,000,000 before use)"

  stratum:
    dhs_name: "v022"
    description: "Survey stratum identifier"

eligibility:
  - "Child age 0-59 months"
  - "Child is alive (b5 == 1)"

methodology:
  wmr_approach: >
    WMR computes fever prevalence stratified by: overall, age group
    (0-6m, 6-12m, 12-24m, 24-36m, 36-48m, 48-60m), wealth quintile,
    sex, residence (urban/rural), and mother's education. Uses svymean
    with survey design (id=~cluster, weights=~weight, strata=~strata, nest=TRUE).
    Note: WMR reference code uses svyciprop; this implementation uses svymean,
    which produces identical point estimates with slightly different CI computation.

  cascade_position: >
    Fever is step 0 of the care-seeking cascade:
    Step 0 Fever (h22) -> Step 1 Sought care (CSB, h32 series) ->
    Step 2 Diagnosed (MALARIA_DX, h47/ml1) ->
    Step 3 Any antimalarial (ml13 series) -> Step 4 Received ACT (ml13e).

  survey_design: >
    options(survey.lonely.psu = "certainty").
    svydesign(id=~cluster, weights=~weight, strata=~strata, nest=TRUE).
    Proportions computed via svymean with vartype="ci". When only one
    stratum is present the design is constructed without strata.

output_format:
  dhs_survey_output:
    description: >
      Returns a named list with one element per admin level: list(adm0, adm1, ...).
      Each element is a long-format tibble with one row per indicator per geographic unit.
    columns:
      survey_id: "DHS survey identifier"
      iso3: "ISO3 country code"
      iso2: "ISO2 country code"
      survey_type: "Survey type (DHS, MIS, etc.)"
      survey_year: "Survey year"
      adm0: "Country name"
      adm1: "First admin level (adm1 table and below)"
      type: "Estimate type: 'survey_weighted'"
      geo_source: "Geographic data source (e.g., 'ge' for GPS/shapefile)"
      point: "Survey-weighted proportion (0-1 scale, rounded to 3 dp)"
      ci_l: "Lower 95% CI (clamped to [0,1])"
      ci_u: "Upper 95% CI (clamped to [0,1])"
      numerator: "Unweighted count (integer)"
      denominator: "Unweighted count (integer)"
      indicator: "Human-readable indicator name"
      indicator_code: "Machine-readable indicator code: 'fever'"
      numerator_description: "Description of what the numerator counts"
      denominator_description: "Description of what the denominator counts"
      denominator_code: "Short code for the denominator"

status: "implemented"
note: >
  Implemented as calc_fever_dhs_core() and calc_fever_dhs(). Also
  available as step 0 of calc_case_management_dhs(). The R implementation
  computes a single overall estimate (or grouped by admin level/region)
  rather than the full WMR sociodemographic stratification (age group,
  wealth quintile, sex, residence, education), which is listed above
  as a reference to published WMR methodology.

references:
  - "WHO World Malaria Report methodology"
  - "DHS Guide to Statistics - Fever prevalence"
