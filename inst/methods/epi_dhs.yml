title: "EPI (Vaccination) DHS Indicator Methodology"
version: "1.1.0"
description: >
  Methodology for estimating vaccination coverage from DHS data.
  Supports standard EPI vaccines plus malaria vaccine.

indicators:
  epi_bcg:
    name: "BCG vaccination"
    numerator: "Children who received BCG"
    denominator: "Children 12-23 months"

  epi_dpt1:
    name: "DPT1 vaccination"
    numerator: "Children who received DPT dose 1"
    denominator: "Children 12-23 months"

  epi_dpt2:
    name: "DPT2 vaccination"
    numerator: "Children who received DPT dose 2"
    denominator: "Children 12-23 months"

  epi_dpt3:
    name: "DPT3 vaccination"
    numerator: "Children who received DPT dose 3"
    denominator: "Children 12-23 months"

  epi_polio1:
    name: "Polio1 vaccination"
    numerator: "Children who received Polio dose 1"
    denominator: "Children 12-23 months"

  epi_polio2:
    name: "Polio2 vaccination"
    numerator: "Children who received Polio dose 2"
    denominator: "Children 12-23 months"

  epi_polio3:
    name: "Polio3 vaccination"
    numerator: "Children who received Polio dose 3"
    denominator: "Children 12-23 months"

  epi_measles1:
    name: "Measles1 vaccination"
    numerator: "Children who received Measles dose 1"
    denominator: "Children 12-23 months"

  epi_measles2:
    name: "Measles2 vaccination"
    numerator: "Children who received Measles dose 2"
    denominator: "Children 12-23 months"

  epi_vita1:
    name: "Vitamin A dose 1"
    numerator: "Children who received Vitamin A dose 1"
    denominator: "Children 12-23 months"

  epi_vita2:
    name: "Vitamin A dose 2"
    numerator: "Children who received Vitamin A dose 2"
    denominator: "Children 12-23 months"

  epi_malaria:
    name: "Malaria vaccine (RTS,S/R21)"
    numerator: "Children who received malaria vaccine"
    denominator: "Children 12-23 months"
    note: "Variable h68, may not be available in all surveys"

  epi_fully_vaccinated:
    name: "Fully vaccinated (basic)"
    numerator: "Children with BCG + DPT3 + Polio3 + Measles1"
    denominator: "Children 12-23 months"

  epi_penta1:
    name: "Pentavalent dose 1"
    numerator: "Children who received Pentavalent dose 1"
    denominator: "Children 12-23 months"
    note: "DHS-7+ variable h51. DPT indicators fall back to pentavalent when h3-h5 are missing."

  epi_penta2:
    name: "Pentavalent dose 2"
    numerator: "Children who received Pentavalent dose 2"
    denominator: "Children 12-23 months"

  epi_penta3:
    name: "Pentavalent dose 3"
    numerator: "Children who received Pentavalent dose 3"
    denominator: "Children 12-23 months"

  epi_pneumo1:
    name: "Pneumococcal dose 1"
    numerator: "Children who received Pneumococcal dose 1"
    denominator: "Children 12-23 months"

  epi_pneumo2:
    name: "Pneumococcal dose 2"
    numerator: "Children who received Pneumococcal dose 2"
    denominator: "Children 12-23 months"

  epi_pneumo3:
    name: "Pneumococcal dose 3"
    numerator: "Children who received Pneumococcal dose 3"
    denominator: "Children 12-23 months"

  epi_rota1:
    name: "Rotavirus dose 1"
    numerator: "Children who received Rotavirus dose 1"
    denominator: "Children 12-23 months"

  epi_rota2:
    name: "Rotavirus dose 2"
    numerator: "Children who received Rotavirus dose 2"
    denominator: "Children 12-23 months"

  epi_rota3:
    name: "Rotavirus dose 3"
    numerator: "Children who received Rotavirus dose 3"
    denominator: "Children 12-23 months"

  epi_ipv:
    name: "Inactivated Polio Vaccine"
    numerator: "Children who received IPV"
    denominator: "Children 12-23 months"

  epi_hepb0:
    name: "Hepatitis B birth dose"
    numerator: "Children who received HepB birth dose"
    denominator: "Children 12-23 months"

  epi_yellowfever:
    name: "Yellow Fever vaccine"
    numerator: "Children who received Yellow Fever vaccine"
    denominator: "Children 12-23 months"

data_sources:
  primary: "KR (Children's Recode)"
  gps: "GE (Geographic)"

variables:
  cluster_id:
    dhs_name: "v001"
    description: "Cluster identifier (used in MBG functions)"

  psu_id:
    dhs_name: "v021"
    description: "Primary sampling unit / cluster ID (used in survey-weighted functions for survey design)"

  survey_weight:
    dhs_name: "v005"
    description: "Sample weight (divide by 1,000,000 before use)"

  stratum:
    dhs_name: "v022"
    description: "Stratum variable for stratified survey design"

  region:
    dhs_name: "v024"
    description: "Region code; used as default grouping variable when no region_var is supplied"

  age_months:
    dhs_name: "hw1"
    description: "Child's age in months"

  bcg:
    dhs_name: "h2"
    description: "BCG vaccine"

  dpt1:
    dhs_name: "h3"
    description: "DPT dose 1"

  dpt2:
    dhs_name: "h4"
    description: "DPT dose 2"

  dpt3:
    dhs_name: "h5"
    description: "DPT dose 3"

  polio1:
    dhs_name: "h6"
    description: "Polio dose 1"

  polio2:
    dhs_name: "h7"
    description: "Polio dose 2"

  polio3:
    dhs_name: "h8"
    description: "Polio dose 3"

  measles1:
    dhs_name: "h9"
    description: "Measles dose 1"

  measles2:
    dhs_name: "h9a"
    description: "Measles dose 2"

  vita1:
    dhs_name: "h33"
    description: "Vitamin A dose 1"

  vita2:
    dhs_name: "h33a"
    description: "Vitamin A dose 2"

  malaria:
    dhs_name: "h68"
    description: "Malaria vaccine (RTS,S/R21)"

  penta1:
    dhs_name: "h51"
    description: "Pentavalent dose 1 (DHS-7+, circa 2015+)"

  penta2:
    dhs_name: "h52"
    description: "Pentavalent dose 2"

  penta3:
    dhs_name: "h53"
    description: "Pentavalent dose 3"

  pneumo1:
    dhs_name: "h54"
    description: "Pneumococcal dose 1"

  pneumo2:
    dhs_name: "h55"
    description: "Pneumococcal dose 2"

  pneumo3:
    dhs_name: "h56"
    description: "Pneumococcal dose 3"

  rota1:
    dhs_name: "h57"
    description: "Rotavirus dose 1"

  rota2:
    dhs_name: "h58"
    description: "Rotavirus dose 2"

  rota3:
    dhs_name: "h59"
    description: "Rotavirus dose 3"

  ipv:
    dhs_name: "h60"
    description: "Inactivated Polio Vaccine"

  hepb0:
    dhs_name: "h50"
    description: "Hepatitis B birth dose"

  yellowfever:
    dhs_name: "h61"
    description: "Yellow Fever vaccine"

fallback_logic:
  dpt_to_pentavalent:
    description: >
      When DPT variables (h3, h4, h5) are missing from the survey but
      pentavalent variables (h51, h52, h53) are present, the system
      automatically falls back to pentavalent as the DPT equivalent.
      Output columns remain named dpt1/dpt2/dpt3 regardless of source.
    mapping:
      dpt1: "h3 -> h51 (pentavalent)"
      dpt2: "h4 -> h52 (pentavalent)"
      dpt3: "h5 -> h53 (pentavalent)"
    note: "Fallback is logged via cli::cli_alert_info()"

vaccination_coding:
  values:
    0: "No"
    1: "Vaccination date on card"
    2: "Reported by mother (no card)"
    3: "Vaccination marked on card (no date)"
  received: "Values 1, 2, or 3 indicate vaccination received"
  note: >
    The R implementation codes any value in {1, 2, 3} as vaccinated (binary 1).
    Value 0 and NA are coded as not vaccinated (binary 0). Values outside
    {0, 1, 2, 3} (e.g., missing/don't know codes 8 or 9) remain NA and are
    excluded via the %in% check.

eligibility:
  - "Child age 12-23 months (completed 1 year, standard EPI target age)"
  - "Age range is configurable"
  - "Cluster has valid GPS coordinates"

output_format:
  columns:
    cluster_id: "Cluster identifier"
    indicator: "Number vaccinated"
    samplesize: "Total eligible children"
    x: "Longitude"
    y: "Latitude"

references:
  - "DHS Guide to Statistics - Vaccination Coverage"
  - "WHO/UNICEF immunization coverage estimates"
  - "Gavi EPI coverage indicators"
