title: "SMC DHS Indicator Methodology"
version: "1.1.0"
description: >
  Methodology for estimating Seasonal Malaria Chemoprevention (SMC) receipt
  from DHS data. Measures proportion of U5 children who received SMC.

indicators:
  smc_receipt:
    name: "SMC receipt (under 5)"
    numerator: "Children who received SMC"
    denominator: "Children under 5 with valid SMC data"
    description: >
      Proportion of children under 5 who received seasonal malaria
      chemoprevention during the malaria season.

data_sources:
  primary: "KR (Children's Recode)"
  gps: "GE (Geographic)"

variables:
  cluster_id:
    dhs_name: "v001"
    description: "Cluster identifier (used in MBG functions)"

  psu_id:
    dhs_name: "v021"
    description: "Primary sampling unit / cluster ID (used in survey-weighted functions for survey design)"

  survey_weight:
    dhs_name: "v005"
    description: "Sample weight (divide by 1,000,000 before use)"

  stratum:
    dhs_name: "v022"
    description: "Stratum variable for stratified survey design"

  region:
    dhs_name: "v024"
    description: "Region code; used as default grouping variable when no region_var is supplied"

  age_months:
    dhs_name: "hw1"
    description: "Child's age in months"

  smc_primary:
    dhs_name: "hml43"
    description: "Child received SMC drugs during malaria season"
    availability: "DHS-7 and later in SMC-eligible countries"
    values:
      0: "No"
      1: "Yes"

  smc_alternative:
    dhs_name: "ml13g"
    description: "Child received antimalarials for prevention (used when hml43 is absent)"
    availability: "Available in some surveys without specific SMC variable"
    values:
      0: "No"
      1: "Yes"

  gps_cluster:
    dhs_name: "DHSCLUST"
    description: "Cluster ID in GPS file (GE recode)"

  gps_lat:
    dhs_name: "LATNUM"
    description: "Latitude coordinate"

  gps_lon:
    dhs_name: "LONGNUM"
    description: "Longitude coordinate"

eligibility:
  - "Child age 0-59 months (age_months >= 0 AND age_months <= 59; children who have not yet reached their 5th birthday)"
  - "Valid SMC response: only values 0 or 1 are retained (missing/NA and don't-know codes excluded via smc_receipt %in% c(0, 1))"
  - "Cluster has valid GPS coordinates (for MBG functions)"

methodology:
  variable_priority: >
    Function checks for hml43 first (SMC-specific), then falls back to
    ml13g (general antimalarial prevention). Survey administrators should
    verify which variable is appropriate for their context.

  geographic_coverage: >
    SMC is only implemented in Sahel countries with highly seasonal
    malaria transmission. Surveys from non-SMC countries will not have
    SMC variables, and the function will return an error.

  target_population: >
    SMC is typically given to children 3-59 months in eligible areas.
    This function includes all children 0-59 months in the denominator
    to match standard DHS reporting.

validation:
  - "Check that SMC variable exists before proceeding"
  - "Exclude don't know / missing responses"
  - "Verify survey is from SMC-eligible country/region"

limitations:
  - "SMC variable may not be available in all surveys"
  - "Variable coding may differ between survey rounds"
  - "Does not capture number of SMC rounds received"

references:
  - "WHO. Seasonal malaria chemoprevention with sulfadoxine-pyrimethamine plus amodiaquine. 2012."
  - "ACCESS-SMC Partnership coverage indicators"
  - "DHS MIS questionnaire - SMC module"
