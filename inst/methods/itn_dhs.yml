title: "ITN DHS Indicator Methodology"
version: "1.2.0"
description: >
  Methodology for estimating ITN (Insecticide-Treated Net) indicators from DHS data.
  Supports ownership, access, and use indicators across multiple age groups.

indicators:
  itn_ownership:
    name: "Household ITN ownership"
    numerator: "Number of households with at least one ITN"
    denominator: "Total number of households"
    level: "household"
    description: >
      Proportion of households owning at least one ITN. A household is
      counted as owning an ITN if any hml10_* variable equals 1.

  itn_access:
    name: "Population ITN access"
    numerator: "Number of individuals with access to an ITN"
    denominator: "Total de facto population"
    level: "individual"
    description: >
      Proportion of de facto household members with access to an ITN.
      Access is calculated as min(ITNs * 2, household_size) / household_size.
      For spatial modeling (calc_itn_mbg), deterministic binary assignment (0/1)
      is used: individuals are sorted by ITN use (users first) and the first
      N = potential_users individuals within each household are assigned access = 1.

  itn_use_all:
    name: "Population ITN use (all ages)"
    numerator: "Number of individuals who slept under ITN last night"
    denominator: "Total de facto population"
    level: "individual"
    description: >
      Proportion of de facto population who used an ITN the night
      before the survey.

  itn_use_u5:
    name: "ITN use among children under 5"
    numerator: "Number of U5 children who slept under ITN"
    denominator: "Total U5 children"
    age_range_years: [0, 5]
    age_filter: "age < 5"
    level: "individual"
    description: >
      Proportion of children under 5 years of age (age < 5, i.e. ages 0-4)
      who slept under an ITN the night before the survey.

  itn_use_5_10:
    name: "ITN use among children 5-9 years"
    numerator: "Number of children 5-9 who slept under ITN"
    denominator: "Total children 5-9"
    age_range_years: [5, 10]
    age_filter: "age >= 5 & age <= 9"
    level: "individual"
    description: >
      Proportion of children aged 5 to 9 years (age >= 5 & age <= 9,
      exclusive upper bound at 10) who slept under an ITN the night
      before the survey. Used in calc_itn_mbg(); the default age groups
      in calc_itn_dhs() differ (see age_stratification in methodology).

  itn_use_10_20:
    name: "ITN use among adolescents 10-19 years"
    numerator: "Number of adolescents 10-19 who slept under ITN"
    denominator: "Total adolescents 10-19"
    age_range_years: [10, 20]
    age_filter: "age >= 10 & age <= 19"
    level: "individual"
    description: >
      Proportion of adolescents aged 10 to 19 years (age >= 10 & age <= 19,
      exclusive upper bound at 20) who slept under an ITN the night
      before the survey. Used in calc_itn_mbg(); the default age groups
      in calc_itn_dhs() differ (see age_stratification in methodology).

  itn_use_20plus:
    name: "ITN use among adults 20+"
    numerator: "Number of adults 20+ who slept under ITN"
    denominator: "Total adults 20+"
    age_range_years: [20, null]
    age_filter: "age >= 20"
    level: "individual"

  itn_use_if_access:
    name: "ITN use among those with access"
    numerator: "Number of individuals with access who slept under ITN"
    denominator: "Number of individuals with ITN access"
    level: "individual"
    description: >
      Proportion of individuals with ITN access who actually used an ITN.
      Measures behavioral gap between access and use.

  itn_sufficient:
    name: "Household has sufficient ITNs"
    numerator: "Number of households with >= 1 ITN per 2 people"
    denominator: "Total number of households"
    level: "household"
    description: >
      Proportion of households with enough ITNs (at least 1 per 2 members).
      Formula: n_itns >= hh_size / 2. WMR calls this enough_itn.

  itn_use_pregnant:
    name: "ITN use among pregnant women"
    numerator: "Number of pregnant women who slept under ITN"
    denominator: "Total pregnant women"
    level: "individual"
    description: >
      Proportion of pregnant women (hml18 == 1 AND hv104 == 2, i.e. female)
      who slept under an ITN. Both the pregnancy flag (hml18) and the sex
      variable (hv104 == 2) are required. Note: Pregnancy status may not be
      available in all surveys.

data_sources:
  household: "HR (Household Recode)"
  individual: "PR (Person Recode)"
  gps: "GE (Geographic)"

variables:
  cluster_id:
    dhs_name: "hv001"
    file: "HR / PR"
    description: "Cluster/enumeration area identifier"

  hhid:
    dhs_name: "hhid"
    file: "HR / PR"
    description: "Household identifier"

  hhsize:
    dhs_name: "hv013"
    file: "HR"
    description: "De facto household size"

  weight:
    dhs_name: "hv005"
    file: "HR / PR"
    description: "Survey weight (divide by 1,000,000 to get fractional weight)"
    note: "Used in survey design for calc_itn_dhs(). Divided by 1e6 in R code."

  stratum:
    dhs_name: "hv022"
    file: "HR / PR"
    description: "Survey stratum variable for stratified design"
    note: "Used in svydesign(strata=~stratum_id, ...). Strata with a single PSU handled via survey.lonely.psu = 'certainty'."

  adm1:
    dhs_name: "hv024"
    file: "HR"
    description: "First administrative level (region/province)"

  age:
    dhs_name: "hv105"
    file: "PR"
    description: "Age of household member in completed years"

  sex:
    dhs_name: "hv104"
    file: "PR"
    description: "Sex of household member"
    values:
      1: "Male"
      2: "Female"

  pregnant:
    dhs_name: "hml18"
    file: "PR"
    description: "Woman is currently pregnant"
    values:
      0: "Not pregnant or NA"
      1: "Pregnant"
    note: "Combined with hv104 == 2 (female) to identify pregnant women in R."

  itn_use:
    dhs_name: "hml12"
    file: "PR"
    description: "Net person slept under last night (treated or untreated)"
    values:
      0: "Did not sleep under a net"
      1: "Slept under an ITN/LLIN (insecticide-treated net)"
      2: "Slept under an untreated net (excluded from ITN use)"
    note: >
      Only hml12 == 1 (LLIN/ITN) is counted as ITN use per SNT methodology.
      hml12 == 2 (untreated net) is explicitly excluded.
      R code: if_else(hml12 == 1L, 1L, 0L, missing = 0L).
      Missing values are treated as non-use (0).

  itn_net_type:
    dhs_name: "hml10_*"
    file: "HR"
    description: >
      Series of per-net variables indicating whether each net is an ITN/LLIN.
      The number of variables varies by survey (e.g., hml10_1, hml10_2, ...).
    values:
      1: "LLIN/ITN"
      0: "Other/not ITN"
    note: >
      n_itns = rowSums across all hml10_* columns where value == 1.
      The prefix is controlled by survey_vars$itn_prefix (default "hml10_").

  gps_cluster:
    dhs_name: "DHSCLUST"
    file: "GE"
    description: "Cluster ID in GPS file (joins to hv001)"

  gps_lat:
    dhs_name: "LATNUM"
    file: "GE"
    description: "Latitude coordinate of cluster centroid"

  gps_lon:
    dhs_name: "LONGNUM"
    file: "GE"
    description: "Longitude coordinate of cluster centroid"

methodology:
  ownership: >
    Household ownership: a household has at least one ITN if any hml10_*
    variable equals 1 (n_itns >= 1). n_itns is computed as rowSums of
    all hml10_* columns recoded to 0/1 (1 if == 1, else 0).

  sufficient: >
    Sufficient ITN coverage: n_itns >= hh_size / 2, i.e., at least one
    ITN per two household members. Equivalent to 2 * n_itns >= hh_size.

  access: >
    ITN access follows standard DHS deterministic assignment methodology.
    Potential users per household = min(number_of_ITNs * 2, household_size).
    Individuals within each household are sorted by ITN use (users first),
    then access is assigned to the first N individuals where N = potential_users.
    This guarantees that use <= access at the individual level.
    In calc_itn_dhs(), access is reported as itn_access_ratio =
    potential_users / hh_size (continuous 0-1, svymean). In calc_itn_mbg(),
    the binary has_access flag (0/1) is summed to cluster counts.

  use: >
    ITN use is measured by hml12 (slept under net last night).
    Per SNT methodology, ONLY treated/insecticide-treated nets (hml12 == 1)
    are counted as ITN use. Untreated nets (hml12 == 2) are explicitly
    excluded. This ensures itn_use indicators reflect true ITN (LLIN)
    coverage, not general net use. Missing values are treated as non-use (0).

  age_stratification: >
    Age is in completed years (hv105). Age groups use an exclusive upper
    bound: the boundary value belongs to the NEXT group, not the current one.
    calc_itn_dhs() default groups: [0,5) = u5, [5,15) = 5_14, [15,Inf) = ov15.
    calc_itn_mbg() fixed groups: [0,5) age < 5, [5,10) age >= 5 & age <= 9,
    [10,20) age >= 10 & age <= 19, [20,Inf) age >= 20.
    Each person is counted in exactly one age group.

  pregnant_women: >
    Pregnant women are identified by hml18 == 1 (pregnant) AND hv104 == 2
    (female). Both conditions must be met. When hml18 is absent from the
    survey data, is_pregnant defaults to 0 and the pregnant indicator is
    not calculated.

  wmr_comparison: >
    WMR computes with_itn (household has >=1 ITN), enough_itn (>=1 ITN per
    2 people), and access (population-level continuous 0-1). Key distinction:
    WMR uses svymean for access (continuous variable) but svyciprop for all
    other ITN indicators (binary). ITN access is the ONLY indicator in the
    WMR suite that uses svymean instead of svyciprop. WMR also computes use
    indicators: use (all population), chu5y_use (U5 children), preg_use
    (pregnant women), stratified by wealth and residence.

  survey_design: >
    svydesign(ids=~cluster_id, weights=~survey_weight, strata=~stratum_id,
    nest=TRUE). Weights are hv005 / 1e6. Strata are hv022.
    options(survey.lonely.psu = "certainty") is set globally for each call.
    Strata with a single PSU are treated as certainty strata (zero variance
    contribution). When all observations share one stratum, the strata
    argument is omitted from svydesign().
    Note: sntmethods R functions use survey::svymean() for all DHS estimates,
    while WMR reference code uses survey::svyciprop() for binary indicators.
    Both produce valid point estimates; CIs differ slightly.

output_format:
  dhs_survey_output:
    description: >
      Returns a named list with one element per admin level: list(adm0, adm1, adm2, ...).
      Each element is a long-format tibble with one row per indicator per geographic unit.
      All proportion values are on the 0-1 scale.
    columns:
      survey_id: "DHS survey identifier"
      iso3: "ISO3 country code"
      iso2: "ISO2 country code"
      survey_type: "Survey type (DHS, MIS, etc.)"
      survey_year: "Survey year"
      adm0: "Country name"
      adm1: "First admin level (adm1 table and below)"
      adm2: "Second admin level (adm2 table and below)"
      type: "Estimate type: 'survey_weighted'"
      geo_source: "Geographic data source (e.g., 'ge' for GPS/shapefile)"
      point: "Survey-weighted proportion (0-1 scale, rounded to 3 dp)"
      ci_l: "Lower 95% CI (clamped to [0,1])"
      ci_u: "Upper 95% CI (clamped to [0,1])"
      numerator: "Unweighted count (integer)"
      denominator: "Unweighted count (integer)"
      indicator: "Human-readable indicator name"
      indicator_code: "Machine-readable indicator code"
      numerator_description: "Description of what the numerator counts"
      denominator_description: "Description of what the denominator counts"
      denominator_code: "Short code for the denominator"
    indicator_codes:
      - "itn_enough: Household has sufficient ITNs (>= 1 per 2 members)"
      - "itn_with: Household owns at least 1 ITN"
      - "itn_access: Population ITN access"
      - "itn_use: Population ITN use (all ages)"
      - "itn_use_chu5: ITN use among children under 5"
      - "itn_use_pregnant: ITN use among pregnant women"
      - "itn_use_if_access: ITN use among those with access"
      - "itn_use_if_access_u5: Use-if-access among U5 (age-stratified)"
      - "itn_use_if_access_5_14: Use-if-access among 5-14 (age-stratified)"
      - "itn_use_if_access_ov15: Use-if-access among 15+ (age-stratified)"
  calc_itn_mbg:
    description: >
      Returns a named list of data.tables (one per indicator). Each table
      has one row per cluster with valid GPS coordinates. This format is
      ready for direct input to MBG spatial modeling.
    columns:
      cluster_id: "Cluster identifier (hv001)"
      indicator: "Numerator count (unweighted)"
      samplesize: "Denominator count (unweighted)"
      x: "Longitude (LONGNUM)"
      y: "Latitude (LATNUM)"

validation:
  - "dhs_hr must be a non-empty data.frame"
  - "dhs_pr must be a non-empty data.frame"
  - "Required HR variables must be present: hv001, hv005, hv022, hhid, hv013, hv024"
  - "Required PR variables must be present: hv001, hv005, hv022, hhid, hv105, hv104, hml12"
  - "At least one ITN variable with prefix hml10_ must exist in HR data"
  - "age_breaks must be strictly increasing and non-negative (if provided)"
  - "length(age_labels) must equal length(age_breaks) - 1 (if provided)"
  - "For calc_itn_mbg: clusters with missing GPS coordinates are excluded from output"
  - "For calc_itn_dhs with shapefile: GPS data is required"

references:
  - "DHS Guide to Statistics - Chapter 5: ITN Coverage"
  - "WHO World Malaria Report ITN indicators"
  - "RBM ITN coverage indicators guidance"
