title: "Under-5 Mortality Rate (U5MR) DHS Indicator Methodology"
version: "1.1.0"
description: >
 Methodology for estimating Under-5 Mortality Rate (U5MR) from DHS birth
 history data. U5MR is modeled as a composite of age-specific mortality risks.
 For spatial smoothing, separate MBG models are fitted for each age group
 and combined using survival probability multiplication.

indicator:
 name: "Under-5 Mortality Rate (U5MR)"
 definition: >
   Probability of dying between birth and exact age 5 years, expressed per
   1,000 live births.
 unit: "deaths per 1,000 live births"
 dhs_module_survey_weighted: "KR (Children's Recode) — used by calc_u5mr_dhs() via DHS.rates::chmort()"
 dhs_module_mbg: "BR (Birth Recode) — used by calc_u5mr_mbg() for cluster-level age-split modeling"
 standard_reference: "WHO/UNICEF/World Bank/UN IGME methodology"

age_groups:
 under1:
   name: "Infant mortality (under 1 year)"
   months_start: 0
   months_end: 12
   description: "Deaths between birth and 12 months of age"
   component: "q0 (neonatal + post-neonatal)"

 age1:
   name: "Child mortality (1 year)"
   months_start: 12
   months_end: 24
   description: "Deaths between 12 and 24 months of age"
   component: "q1"

 age2:
   name: "Child mortality (2 years)"
   months_start: 24
   months_end: 36
   description: "Deaths between 24 and 36 months of age"
   component: "q2"

 age3:
   name: "Child mortality (3 years)"
   months_start: 36
   months_end: 48
   description: "Deaths between 36 and 48 months of age"
   component: "q3"

 age4:
   name: "Child mortality (4 years)"
   months_start: 48
   months_end: 60
   description: "Deaths between 48 and 60 months of age"
   component: "q4"

methodology:
 overview: >
   U5MR estimation requires modeling mortality as a composite of detailed age
   groups because wider age groups would require dropping observations where
   children have not yet reached the upper age bound, making the data
   non-representative. The approach fits separate spatial models for each
   single-year age group and combines them using survival probabilities.

 formula:
   composite: "U5MR = 1 - (1 - q_under1) × (1 - q_age1) × (1 - q_age2) × (1 - q_age3) × (1 - q_age4)"
   interpretation: >
     The probability of dying before age 5 equals one minus the probability
     of surviving all five age intervals. Each q represents the conditional
     probability of dying within that age interval given survival to the
     start of the interval.
   per_1000: "U5MR_per_1000 = U5MR × 1000"

 retrospective_period:
   default_months: 60
   extended_months: 120
   rationale: >
     DHS standard estimates use 5-year (60-month) retrospective windows.
     A 10-year (120-month) window can be used for subnational estimates
     to increase sample sizes, though this may mask recent trends.

workflow:
 step1_load_data:
   description: "Load DHS birth history microdata (BR recode) for MBG path; KR recode for survey-weighted path"
   inputs:
     mbg_path:
       - "BR (Birth Recode) file from DHS"
       - "GE (GPS) file for cluster coordinates"
     survey_weighted_path:
       - "KR (Children's Recode) file from DHS"
       - "Optionally GE (GPS) + shapefile for spatial aggregation"
   key_variables:
     b3: "Date of birth (CMC format)"
     b5: "Child is alive (0=no, 1=yes)"
     b7: "Age at death in months (used for MBG age-split; also used by DHS.rates in KR path)"
     v008: "Date of interview (CMC format)"
     v001: "Cluster number (MBG functions)"
     v021: "Primary sampling unit (survey-weighted functions)"
     v002: "Household number (hhid)"
     bidx: "Birth index (child ID within mother)"
     v005: "Sample weight (survey-weighted functions)"
     v022: "Stratum (survey-weighted functions)"
   output: "Cleaned birth history data.table"

 step2_split_ages:
   description: "Split birth histories into age-specific cohorts (MBG path only; implemented inline in calc_u5mr_mbg())"
   function: "calc_u5mr_mbg() inline loop (no separate split_ages() function)"
   parameters:
     age_groups:
       under1: [0, 12]
       age1: [12, 24]
       age2: [24, 36]
       age3: [36, 48]
       age4: [48, 60]
     retrospective_months: 60
     child_id_columns: ["cluster_id", "hhid", "birth_index"]
   logic:
     - "For each age group [age_start, age_end]: include only children where months_since_birth >= age_end (child fully completed the age group before interview — right-censoring)"
     - "Include children who survived to reach the age group: child_alive == 1 OR (child_alive == 0 AND death_age_months >= age_start)"
     - "Restrict to retrospective window: months_since_birth - age_start <= retrospective_months"
     - "Flag died_in_interval = 1 if child_alive == 0 AND death_age_months in [age_start, age_end)"
   output: "Per-age-group data with died_in_interval column"

 step3_cluster_aggregation:
   description: "Aggregate to cluster level for each age group (MBG path)"
   aggregation:
     grouping: ["cluster_id"]
     numerator: "sum(died_in_interval)"
     denominator: "n() (count of eligible children in the age group)"
     note: "Aggregation runs separately per age group in a loop; no combined age_group column"
   output: "Cluster-level mortality counts by age group (one data frame per age group)"

 step4_merge_coordinates:
   description: "Merge GPS coordinates from GE file"
   join_key: "cluster_id = DHSCLUST"
   filter: "Remove clusters with missing or zero coordinates"
   output: "Georeferenced cluster mortality data"

 step5_mbg_models:
   description: "Run separate MBG model for each age group"
   model_type: "Binomial spatial model with SPDE mesh"
   covariates:
     - "Intercept only (pure spatial smoothing)"
     - "Optional: population density, urbanization, accessibility"
   iterations: 5
   outputs_per_model:
     - "cell_pred_mean: Mean mortality risk raster"
     - "cell_pred_lower: Lower 95% credible interval"
     - "cell_pred_upper: Upper 95% credible interval"
   note: >
     Each model produces mortality risk (q) for its age group.
     Models are independent; uncertainty propagation requires
     simulation-based approaches or approximations.

 step6_combine_age_groups:
   description: "Combine age-specific mortality into U5MR"
   formula: "u5mr = 1 - prod(1 - q_under1, 1 - q_age1, 1 - q_age2, 1 - q_age3, 1 - q_age4)"
   implementation:
     - "Load mean raster for each age group"
     - "Calculate survival probability for each: surv_i = 1 - q_i"
     - "Multiply survival probabilities across age groups"
     - "U5MR = 1 - product of survival probabilities"
   uncertainty_note: >
     Simple combination of mean estimates does not propagate uncertainty
     correctly. For valid uncertainty bounds, draw from posterior
     distributions of each model and combine at the draw level.

 step7_admin_aggregation:
   description: "Aggregate pixel-level estimates to admin units"
   method: "Population-weighted mean"
   levels: ["adm0", "adm1", "adm2"]
   outputs:
     - "Mean U5MR by admin unit"
     - "Uncertainty bounds (if draw-level combination performed)"

cmc_date_handling:
 description: "Century Month Code (CMC) conversion utilities"
 cmc_definition: "CMC = (year - 1900) * 12 + month, where month is 1 (January) through 12 (December)"
 cmc_to_year: "floor((cmc - 1) / 12) + 1900"
 cmc_to_month: "((cmc - 1) %% 12) + 1"
 year_month_to_cmc: "(year - 1900) * 12 + month"
 example_january: "CMC 1369 = January 2014: (2014 - 1900) * 12 + 1 = 1369; reverse: floor((1369 - 1) / 12) + 1900 = floor(114) + 1900 = 2014"
 example_december: "CMC 1380 = December 2014: (2014 - 1900) * 12 + 12 = 1380; reverse: floor((1380 - 1) / 12) + 1900 = floor(114.9) + 1900 = 2014"
 note: >
   The R implementation uses CMC arithmetic directly for date differences
   (e.g., months_since_birth = interview_cmc - birth_cmc) and passes b3
   (birth CMC) and v008 (interview CMC) directly to DHS.rates::chmort().

validation:
 data_quality:
   - "Check for heaping on ages 12, 24, 36, 48 months"
   - "Verify interview dates are after birth dates"
   - "Check for implausible death ages"
   - "Validate cluster coordinates are within country boundaries"

 output_checks:
   - "U5MR per 1,000 live births: dhs_u5mr from DHS.rates is already on per-1,000 scale; u5mr_raw in MBG function is multiplied by 1,000 to match"
   - "Age-specific rates should generally decrease with age (under-1 typically highest)"
   - "Compare national aggregate to DHS report estimates"
   - "Check for spatial patterns consistent with known health gradients"

output_format:
  dhs_survey_output:
    description: >
      Returns a named list with one element per admin level: list(adm0, adm1, ...).
      Each element is a long-format tibble with one row per indicator per geographic unit.
      U5MR values are per 1,000 live births (not proportions).
    columns:
      survey_id: "DHS survey identifier"
      iso3: "ISO3 country code"
      iso2: "ISO2 country code"
      survey_type: "Survey type (DHS, MIS, etc.)"
      survey_year: "Survey year"
      adm0: "Country name"
      adm1: "First admin level (adm1 table and below)"
      type: "Estimate type: 'survey_weighted'"
      geo_source: "Geographic data source (e.g., 'ge' for GPS/shapefile)"
      point: "Mortality rate per 1,000 live births (rounded to 3 dp)"
      ci_l: "Lower 95% CI"
      ci_u: "Upper 95% CI"
      numerator: "Number of deaths (integer)"
      denominator: "Number of live births / person-years at risk (integer)"
      indicator: "Human-readable indicator name"
      indicator_code: "Machine-readable indicator code"
      numerator_description: "Description of what the numerator counts"
      denominator_description: "Description of what the denominator counts"
      denominator_code: "Short code for the denominator"
    indicator_codes:
      - "nmr: Neonatal mortality rate (0-28 days)"
      - "imr: Infant mortality rate (0-11 months)"
      - "cmr: Child mortality rate (12-59 months)"
      - "u5mr: Under-5 mortality rate (0-59 months)"

limitations:
 - "Five independent models do not share information across age groups"
 - "Uncertainty intervals from mean combination are approximate"
 - "Requires sufficient cluster-level deaths for stable estimation"
 - "GPS displacement affects fine-scale spatial patterns"
 - "Retrospective nature may miss recent mortality changes"

future_improvements:
 - "Space-age joint model sharing strength across age groups"
 - "Proper uncertainty propagation via simulation"
 - "Integration of covariates (access to health care, wealth, etc.)"
 - "Multi-survey pooling for trend estimation"

references:
 - "DHS Guide to Statistics (Chapter 9: Childhood Mortality)"
 - "IHME MBG methodology papers"
 - "Golding et al. (2017) - Mapping under-5 mortality"
 - "UN IGME methodology notes"
