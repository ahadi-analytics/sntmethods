title: "Antimalarial Treatment — WMR Methodology Reference"
version: "1.0.0"
description: >
  Documents the WMR approach to antimalarial treatment receipt among
  febrile children. Captures receipt of ANY antimalarial drug, of which
  ACT (ml13e) is a subset.

indicators:
  antimalarial:
    name: "Received any antimalarial"
    numerator: "Febrile children who received any antimalarial drug"
    denominator: "Children under 5 with fever"
    description: >
      Proportion of febrile U5 children who received any antimalarial,
      including ACT, chloroquine, quinine, amodiaquine, SP/Fansidar,
      artesunate, primaquine, or mefloquine.

data_sources:
  primary: "KR (Children's Recode)"

variables:
  # --- Survey design variables ---
  cluster:
    dhs_name: "v021"
    description: "Sample cluster/PSU identifier for survey design"
    note: "Default survey_vars$cluster in calc_antimalarial_dhs_core()"

  weight:
    dhs_name: "v005"
    description: "Survey sample weight (divided by 1e6 in R to obtain fractional weight)"

  stratum:
    dhs_name: "v022"
    description: "Survey stratum identifier for stratified design"

  age:
    dhs_name: "hw1"
    description: "Child's age in months (eligibility: 0-59)"

  fever:
    dhs_name: "h22"
    description: "Child had fever in last 2 weeks"
    values:
      0: "No"
      1: "Yes"

  # --- Primary drug series: ml13* (DHS Phase 7+, most surveys from ~2015 onwards) ---
  drugs_act:
    dhs_name: "ml13e"
    description: "ACT (artemisinin-based combination therapy)"
  drugs_cq:
    dhs_name: "ml13a"
    description: "Chloroquine"
  drugs_qn:
    dhs_name: "ml13b"
    description: "Quinine"
  drugs_aq:
    dhs_name: "ml13c"
    description: "Amodiaquine"
  drugs_as:
    dhs_name: "ml13d"
    description: "Artesunate"
  drugs_sp:
    dhs_name: "ml13aa"
    description: "SP/Fansidar"
  drugs_pq:
    dhs_name: "ml13f"
    description: "Primaquine (variable may vary by survey)"
  drugs_mq:
    dhs_name: "ml13g"
    description: "Mefloquine (variable may vary by survey)"

  drugs_antimalarial:
    dhs_name: "varies by survey"
    description: "Other antimalarial (catch-all variable)"
    note: >
      WMR includes this as a catch-all in the receive_antimalarial formula.
      The actual DHS variable name varies by survey. Check the survey-specific
      recode manual for the appropriate variable. In sntmethods the R regex
      ^ml13[a-z]*$ captures ALL ml13* columns present in the data, including
      any survey-specific catch-all variables, so no explicit mapping is needed.

  # --- Fallback series: h37* (older DHS surveys, e.g. BFA 2021) ---
  # When ml13* variables are absent, sntmethods auto-detects h37a-h as the
  # drug-specific treatment series for child fever/cough.
  # The regex ^h37[a-h]$ detects h37a through h37h (eight variables).
  # IMPORTANT: ml1 is NOT a valid fallback — in BFA 2021, ml1 = "Times took
  # Fansidar during pregnancy" (IPTp), not child fever treatment.
  fallback_sp:
    dhs_name: "h37a"
    description: "SP/Fansidar taken for fever/cough (older surveys)"
    note: >
      Used for fever treatment. Equivalent to ml13aa in newer surveys.
      Distinct from ml1 which records SP taken during pregnancy (IPTp) —
      do not confuse these two variables.
  fallback_cq:
    dhs_name: "h37b"
    description: "Chloroquine taken for fever/cough (older surveys)"
    note: "Equivalent to ml13a in newer surveys."
  fallback_aq:
    dhs_name: "h37c"
    description: "Amodiaquine taken for fever/cough (older surveys)"
    note: "Equivalent to ml13c in newer surveys."
  fallback_qn:
    dhs_name: "h37d"
    description: "Quinine taken for fever/cough (older surveys)"
    note: "Equivalent to ml13b in newer surveys."
  fallback_act:
    dhs_name: "h37e"
    description: "Combination with artemisinin taken for fever/cough (older surveys)"
    note: "Equivalent to ml13e in newer surveys. Used when ml13e is absent."
  fallback_pq:
    dhs_name: "h37f"
    description: "Primaquine taken for fever/cough (older surveys)"
    note: "Equivalent to ml13f in newer surveys. Detected by ^h37[a-h]$ regex."
  fallback_mq:
    dhs_name: "h37g"
    description: "Mefloquine taken for fever/cough (older surveys)"
    note: "Equivalent to ml13g in newer surveys. Detected by ^h37[a-h]$ regex."
  fallback_other:
    dhs_name: "h37h"
    description: "Other antimalarial taken for fever/cough (older surveys)"
    note: "Catch-all for other antimalarials. Detected by ^h37[a-h]$ regex."

eligibility:
  - "Child age 0-59 months (hw1 >= 0 and hw1 <= 59)"
  - "Child had fever in last 2 weeks (h22 == 1)"
  - "At least one antimalarial drug variable must be non-missing"

methodology:
  wmr_approach: >
    WMR defines receive_antimalarial = 1 if ANY of the ml13 drug
    variables equals 1. Computed overall and stratified by CSB category
    (public, CHW, private, pharmacy, trained provider, any treatment,
    no treatment) and by sociodemographic factors.

  cascade_position: >
    Antimalarial treatment is step 3 of the care-seeking cascade (0-indexed):
    Step 0: Fever (h22) -> Step 1: Sought care (CSB, h32 series) ->
    Step 2: Diagnosed (MALARIA_DX, h47) ->
    Step 3: Treated (ANTIMALARIAL, ml13 series or h37 series) ->
    Step 4: Received ACT (ml13e or h37e).
    This numbering is consistent with calc_case_management_dhs() which assigns
    step = 3L to the any_antimalarial cascade row.

  variable_detection: >
    sntmethods auto-detects the available drug series at runtime:
    (1) ml13* preferred — used when present (DHS Phase 7+, most surveys ~2015+).
    (2) h37a-h fallback — used when ml13* absent (older DHS surveys, e.g. BFA 2021).
    (3) ml1 is NOT used as a fallback. In some surveys (e.g. BFA 2021), ml1 encodes
        "Times took Fansidar during pregnancy" (an IPTp variable), not child treatment.

  relationship_to_act: >
    ACT (ml13e) is a SUBSET of antimalarial treatment. All ACT
    recipients are antimalarial recipients, but not vice versa.
    WMR computes ACT as a proportion of antimalarial recipients
    at each CSB level (e.g., ACT among those who received any
    antimalarial from public sector).

  survey_design: >
    svydesign(id=~cluster, weights=~weight, strata=~strata, nest=TRUE).
    options(survey.lonely.psu = "certainty") applied when strata are present.
    sntmethods uses survey::svymean() (not svyciprop) for point estimates and
    CIs. Both produce equivalent point estimates; CI widths differ slightly.
    When only one stratum is present, the stratified design is dropped and
    a cluster-only design is used to avoid singleton-PSU errors.

output_format:
  dhs_survey_output:
    description: >
      Returns a named list with one element per admin level: list(adm0, adm1, ...).
      Each element is a long-format tibble with one row per indicator per geographic unit.
    columns:
      survey_id: "DHS survey identifier"
      iso3: "ISO3 country code"
      iso2: "ISO2 country code"
      survey_type: "Survey type (DHS, MIS, etc.)"
      survey_year: "Survey year"
      adm0: "Country name"
      adm1: "First admin level (adm1 table and below)"
      type: "Estimate type: 'survey_weighted'"
      geo_source: "Geographic data source (e.g., 'ge' for GPS/shapefile)"
      point: "Survey-weighted proportion (0-1 scale, rounded to 3 dp)"
      ci_l: "Lower 95% CI (clamped to [0,1])"
      ci_u: "Upper 95% CI (clamped to [0,1])"
      numerator: "Unweighted count (integer)"
      denominator: "Unweighted count (integer)"
      indicator: "Human-readable indicator name"
      indicator_code: "Machine-readable indicator code"
      numerator_description: "Description of what the numerator counts"
      denominator_description: "Description of what the denominator counts"
      denominator_code: "Short code for the denominator"
    indicator_codes:
      - "antimalarial: Received any antimalarial among febrile children"
      - "antimalarial_public: Received any antimalarial among public sector care seekers"

status: "implemented"
note: >
  Implemented as calc_antimalarial_dhs_core() and calc_antimalarial_dhs().
  Also available as step 3 of calc_case_management_dhs(). The ACT-specific
  subset is implemented in calc_act_dhs() and calc_act_mbg().

references:
  - "WHO World Malaria Report - Antimalarial treatment"
  - "DHS Guide to Statistics - Treatment of fever"
