title: "TPR Computation and Proxy Framework"
version: "1.0.0"
description: >
  Defines the method for calculating Test Positivity Rate (TPR) from
  routine malaria data and for deriving proxy values when direct
  calculation is not possible. Ensures consistency across facilities and
  administrative levels and provides a valid TPR for each reporting
  period. The framework supports incidence estimation and adjustment in
  SNT workflows by supplying a reliable indicator of diagnostic
  completeness and malaria transmission intensity. Variables follow SNT
  standard naming conventions, using `conf` for confirmed cases and
  `test` for tested individuals. When age-disaggregated data are used
  (e.g., `conf_u5`, `test_u5`), TPR is computed separately for each
  subgroup.

compute_tpr:
  description: >
    Calculates malaria TPR at facility and administrative levels and
    applies structured fallback logic to derive proxy values when
    confirmed or tested data are missing. Produces a complete, validated
    TPR dataset used for incidence adjustment.

  stages:
    - stage: 1
      name: Input validation and cleaning
      actions:
        - "Ensure conf, test, and pres are numeric and ≥ 0."
        - "Flag impossible values (conf > test)."
        - "Convert test == 0 to NA to avoid divide-by-zero."
        - "Drop incomplete months (report_complete == 0)."
        - "Standardise date to first day of month; extract year and month."
        - "Maintain alignment for age-disaggregated variables
          (e.g., conf_u5 ≤ test_u5)."

    - stage: 2
      name: TPR calculation and proxy derivation
      description: >
        Calculate TPR directly where conf and test are valid. For missing
        or invalid facility-months, derive proxy TPRs using a sequential
        fallback hierarchy based on available data.
      steps:
        - "Compute tpr_raw = conf / test."
        - "When tpr_raw is missing, assign proxy using the following order:
          1. District (adm2_calc) TPR
          2. Same month previous year (facility)
          3. Regional (adm1_calc) TPR
          4. National (adm0_calc) TPR."
        - "Each fallback step uses only valid conf and test values from
          contributing units."
      outputs:
        - "tpr"
        - "tpr_source"
      notes:
        - "All aggregated TPRs computed as sum(conf)/sum(test) using
          weighted means (weights = test)."
        - "For age-disaggregated datasets, apply logic separately for
          conf_u5/test_u5 and other subgroups."

    - stage: 3
      name: Quality assurance and metadata
      actions:
        - "Flag facility-months with missing or extreme TPR values."
        - "Mark proxy-derived TPRs with flag_tpr_proxy = TRUE."
        - "Record tpr_source to indicate data origin (facility, adm2,
          previous_year, adm1, or adm0)."
      metadata_fields:
        - hf_uid
        - adm1
        - adm2
        - date
        - test
        - conf
        - pres
        - report_complete
        - tpr_source

  outputs:
    - name: tpr
      type: numeric
      description: "Final validated or proxy TPR per facility-month."
    - name: tpr_source
      type: character
      values:
        - facility_raw
        - proxy_adm2
        - proxy_prev_year
        - proxy_adm1
        - proxy_adm0
    - name: flags
      list:
        - flag_tpr_valid
        - flag_tpr_extreme
        - flag_tpr_proxy
        - flag_tpr_missing
