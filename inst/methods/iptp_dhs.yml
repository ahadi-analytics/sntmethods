title: "IPTp DHS Indicator Methodology"
version: "1.2.0"
description: >
  Methodology for estimating IPTp (Intermittent Preventive Treatment in
  pregnancy) indicators from DHS data. Supports cumulative and exclusive
  dose categories.

indicators:
  cumulative:
    iptp_1plus:
      name: "IPTp 1+ doses"
      numerator: "Women who received at least 1 dose of SP/Fansidar"
      denominator: "Women with recent birth"

    iptp_2plus:
      name: "IPTp 2+ doses"
      numerator: "Women who received at least 2 doses of SP/Fansidar"
      denominator: "Women with recent birth"

    iptp_3plus:
      name: "IPTp 3+ doses"
      numerator: "Women who received at least 3 doses of SP/Fansidar"
      denominator: "Women with recent birth"
      note: "WHO-recommended minimum for malaria prevention in pregnancy"

    iptp_4plus:
      name: "IPTp 4+ doses"
      numerator: "Women who received at least 4 doses of SP/Fansidar"
      denominator: "Women with recent birth"
      note: >
        Some national programs target 4+ doses. Requires ml1_1 (sp_dose_count)
        as the survey variable — m49a_1 (binary) cannot compute this indicator.
        In the MBG path, map survey_vars$sp_doses to ml1_1 to enable 4+.
        iptp_4plus <= iptp_3plus (subset relationship).

  exclusive:
    iptp_1only:
      name: "IPTp exactly 1 dose"
      numerator: "Women who received exactly 1 dose"
      denominator: "Women with recent birth"

    iptp_2only:
      name: "IPTp exactly 2 doses"
      numerator: "Women who received exactly 2 doses"
      denominator: "Women with recent birth"

    iptp_3only:
      name: "IPTp exactly 3 doses"
      numerator: "Women who received exactly 3 doses"
      denominator: "Women with recent birth"

data_sources:
  primary: "IR (Individual Recode)"
  gps: "GE (Geographic)"

variables:
  cluster_id:
    dhs_name: "v001"
    description: "Cluster/enumeration area identifier"

  survey_weight:
    dhs_name: "v005"
    description: "Sample weight (divide by 1,000,000 for proportions)"

  stratum:
    dhs_name: "v022"
    description: "Sample stratum (used for stratified survey design)"

  adm1:
    dhs_name: "v024"
    description: "First administrative level (region/province)"

  interview_date:
    dhs_name: "v008"
    description: "Date of interview (CMC format)"

  birth_date:
    dhs_name: "b3_01"
    description: "Date of most recent birth (CMC format)"
    note: "_1 suffix (or _01) indicates most recent birth from the birth history"

  sp_taken:
    dhs_name: "m49a_1"
    description: "Took SP/Fansidar during pregnancy (binary: 0 = No, 1 = Yes)"
    values:
      0: "No"
      1: "Yes"
    note: >
      _1 suffix indicates the most recent pregnancy. m49a_1 is a BINARY
      variable (0/1 only). In the DHS survey-weighted path, m49a_1 is not
      used directly for dose counting; ml1_1 provides the actual dose count.
      In the MBG path (calc_iptp_mbg), the survey_vars$sp_doses key maps to
      m49a_1 by default, and the dose indicators (1plus, 2plus, 3plus) are
      computed by applying >= 1, >= 2, >= 3 to this binary variable.
      Consequently, the MBG path can only correctly estimate 1+ coverage
      (dose >= 1); 2+ and 3+ will always be zero because m49a_1 never
      exceeds 1. To estimate 2+ and 3+ in the MBG path, map sp_doses to
      ml1_1 instead.

  sp_dose_count:
    dhs_name: "ml1_1"
    description: "Number of SP/Fansidar doses taken during pregnancy"
    values:
      0: "None"
      1-7: "Number of doses"
      90+: "Don't know / Other"
    note: >
      Used in the DHS survey-weighted implementation for counting doses
      (the default sp_doses key in calc_iptp_dhs_core). Valid responses
      are 0-7; values >= 90 are excluded (filter: sp_doses <= 7). For the
      MBG path, map survey_vars$sp_doses to ml1_1 to correctly compute
      2+ and 3+ indicators.

  child_age_months:
    dhs_name: "b19_01"
    description: "Age of most recent child in months"
    note: >
      Listed in survey_vars as birth_age_months but NOT currently used by
      the R implementation. The birth window filter is computed via CMC
      arithmetic (interview_cmc - birth_cmc), not from b19_01 directly.

  gps_cluster:
    dhs_name: "DHSCLUST"
    description: "Cluster ID in GPS file (GE recode)"

  gps_lat:
    dhs_name: "LATNUM"
    description: "Latitude coordinate"

  gps_lon:
    dhs_name: "LONGNUM"
    description: "Longitude coordinate"

eligibility:
  - "Woman had a birth within analysis window (CMC filter: interview_cmc - b3_01 <= birth_window_months)"
  - "Birth is not in the future (months_since_birth >= 0)"
  - "Valid SP response: sp_doses not NA and sp_doses <= 7 (excludes 'don't know' codes >= 90)"
  - "Cluster has valid GPS coordinates (MBG path only)"
  - "Note: no ANC attendance restriction is applied in the current implementation"

methodology:
  who_recommendation: >
    WHO recommends at least 3 doses of IPTp-SP for pregnant women in
    malaria-endemic areas. Some programs aim for 4+ doses.

  denominator: >
    Denominator is all women with a birth in the analysis window and a valid
    SP response (sp_doses <= 7). No ANC attendance restriction is applied.
    Some external analyses restrict to women who attended ANC at least once,
    but this implementation does not apply that restriction.

  cumulative_vs_exclusive: >
    Cumulative indicators (1plus, 2plus, 3plus) count all women who
    received at least N doses. Exclusive indicators count women who
    received exactly N doses.

  birth_window: >
    Default birth window: 36 months for MBG, 24 months for DHS survey-weighted
    estimation. The wider MBG window maximizes spatial data availability; the
    narrower DHS window focuses on more recent pregnancies.

output_format:
  mbg_cluster_output:
    cluster_id: "Cluster identifier"
    indicator: "Number meeting threshold"
    samplesize: "Total eligible women"
    x: "Longitude"
    y: "Latitude"

  dhs_survey_output:
    grouping_note: >
      Grouping column is adm1 (v024 by default) or cluster_id when GPS data
      is provided without a shapefile. When neither admin nor GPS variables
      are available, a single row with level = "National" is returned.
    columns:
      dhs_iptp_1: "Proportion receiving 1+ SP doses (survey-weighted)"
      dhs_iptp_1_low: "Lower 95% CI for IPTp 1+ (clamped to 0)"
      dhs_iptp_1_upp: "Upper 95% CI for IPTp 1+ (clamped to 1)"
      dhs_iptp_2: "Proportion receiving 2+ SP doses (survey-weighted)"
      dhs_iptp_2_low: "Lower 95% CI for IPTp 2+ (clamped to 0)"
      dhs_iptp_2_upp: "Upper 95% CI for IPTp 2+ (clamped to 1)"
      dhs_iptp_3: "Proportion receiving 3+ SP doses (survey-weighted)"
      dhs_iptp_3_low: "Lower 95% CI for IPTp 3+ (clamped to 0)"
      dhs_iptp_3_upp: "Upper 95% CI for IPTp 3+ (clamped to 1)"
      dhs_iptp_4: "Proportion receiving 4+ SP doses (survey-weighted; requires ml1_1)"
      dhs_iptp_4_low: "Lower 95% CI for IPTp 4+ (clamped to 0)"
      dhs_iptp_4_upp: "Upper 95% CI for IPTp 4+ (clamped to 1)"
      dhs_n_women: "Unweighted count of eligible women (denominator)"
      dhs_n_iptp_1plus: "Unweighted count receiving 1+ doses"
      dhs_n_iptp_2plus: "Unweighted count receiving 2+ doses"
      dhs_n_iptp_3plus: "Unweighted count receiving 3+ doses"
      dhs_n_iptp_4plus: "Unweighted count receiving 4+ doses"
    monotonicity: "dhs_iptp_1 >= dhs_iptp_2 >= dhs_iptp_3 >= dhs_iptp_4"

  wmr_note: >
    IPTp is NOT included in the WMR DHS analysis debug scripts (2a_functions).
    IPTp is typically analyzed separately from the fever/treatment cascade.
    Uses m49a_1 from the IR file, which is standard DHS methodology.

references:
  - "WHO. Updated WHO policy recommendation: IPTp-SP. 2012."
  - "DHS Guide to Statistics - IPTp indicators"
  - "WHO World Malaria Report - IPTp coverage"
