url: https://ahadi-analytics.github.io/sntmethods/

template:
  bootstrap: 5
  bootswatch: flatly
  light-switch: true
  includes:
    in_header: |
      <script>
        (function() {
          // light between 06:00 and 18:00 local time, dark otherwise
          var hour = new Date().getHours();
          var timeOfDay = (hour >= 6 && hour < 18) ? 'light' : 'dark';
          var ls;
          try { ls = window.localStorage; } catch (e) { ls = null; }
          var userSet = ls && ls.getItem('pkgdown-theme-source') === 'user';
          var stored = ls && ls.getItem('pkgdown-theme');
          var theme = (userSet && stored) ? stored : timeOfDay;
          if (ls && !userSet) ls.setItem('pkgdown-theme', timeOfDay);
          document.documentElement.dataset.bsTheme = theme;
          // any later change to data-bs-theme (via pkgdown's lightswitch)
          // is an explicit user choice — remember it for next visit
          new MutationObserver(function() {
            var current = document.documentElement.dataset.bsTheme;
            if (!current || !ls) return;
            ls.setItem('pkgdown-theme', current);
            ls.setItem('pkgdown-theme-source', 'user');
          }).observe(document.documentElement, {
            attributes: true, attributeFilter: ['data-bs-theme']
          });
        })();
      </script>
  bslib:
    primary: "#0F2333"
    secondary: "#628DA5"
    success: "#B3CB72"
    info: "#5EAADD"
    warning: "#FFC225"
    danger: "#ff7a7a"
    link-color: "#4682B4"
    link-hover-color: "#FFC225"
    navbar-bg: "#0F2333"
    navbar-fg: "#FFFFFF"
    headings-color: "#0F2333"
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "JetBrains Mono"}

development:
