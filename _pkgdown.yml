opengraph:
  image:
    src: man/figures/logo.png
    alt: "sntmethods - analytical methods for Subnational Tailoring of malaria interventions"

home:
  title: sntmethods - analytical methods for Subnational Tailoring
  description: >
    R package developed by AHADI providing epidemiologically grounded analytical
    methods for the Subnational Tailoring (SNT) of malaria control strategies.
    Transforms DHS survey microdata and routine health facility data into
    survey-weighted indicators, model-based geostatistical surfaces and
    incidence estimates for district-level program planning.
  sidebar:
    structure: [links, license, community, citation, authors, dev]
  links:
    - text: AHADI website
      href: https://appliedhealthanalytics.org
    - text: sntutils (companion package)
      href: https://ahadi-analytics.github.io/sntutils/
    - text: Subnational Tailoring code library
      href: https://ahadi-analytics.github.io/snt-code-library/

